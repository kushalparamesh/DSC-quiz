 {"num": 92, "text": "During COVID-19, which type of company was MOST severely impacted by\nsupply chain disruptions?", "options": ["A. Companies with digitally transformed, resilient supply chains using\nAI and IoT", "B. Companies with JIT, lean, digitally immature supply chains with no\nbuffer inventory or visibility", "C. Companies with large safety stock buffers and multiple suppliers", "D. Companies using blockchain for provenance tracking"], "answer": "B", "explanation": "COVID-19 hit lean, JIT-focused, digitally immature supply chains hardest. Without visibility, buffer stock, or digital tools to respond dynamically, these companies faced stockouts, supplier failures, and inability to adapt."}, {"num": 93, "text": "A logistics provider's digital platform automatically triggers a backup\nsupplier when the primary supplier's delivery is flagged as delayed by\nan IoT tracking alert. Which combination of technologies is enabling\nthis?", "options": ["A. Blockchain and additive manufacturing", "B. IoT (detecting the delay) combined with AI decision logic (triggering\nthe backup supplier)", "C. Cloud computing and smart factory", "D. Digital twin and blockchain"], "answer": "B", "explanation": "IoT provides the real-time visibility (detecting the delayed delivery), and AI decision logic automatically acts on that information (triggering the backup supplier). This IoT-AI combination is a hallmark of intelligent, autonomous supply chain management."}, {"num": 94, "text": "A supply chain manager says: \"We know in real time where every shipment\nis, but our decisions are still made manually by planners reviewing\nreports.\" Which maturity stage does this describe?", "options": ["A. Digitally Immature", "B. Digitally Enabled --- visibility is present but decisions are still\nhuman and reactive", "C. Digitally Transformed", "D. Fully autonomous supply chain"], "answer": "B", "explanation": "Having real-time tracking (via IoT) but still relying on manual human decision-making from reports reflects Digitally Enabled maturity. Technology assists but does not yet drive autonomous or predictive decision-making."}, {"num": 95, "text": "A company's supply chain team creates a dashboard showing real-time\ninventory levels, supplier lead times, demand forecasts, and logistics\ntracking --- all in one view accessible to all partners. This is an\nexample of:", "options": ["A. A digital supply chain control tower", "B. Centralised warehousing strategy", "C. Additive manufacturing network", "D. Traditional ERP implementation only"], "answer": "A", "explanation": "A digital supply chain control tower provides end-to-end visibility across all supply chain nodes and flows in a single dashboard. It combines IoT, AI, and cloud data to give all stakeholders a shared, real-time operational view."}, {"num": 96, "text": "The term \"decision intelligence\" in digital supply chains refers to:", "options": ["A. Human managers making faster decisions with paper-based reports", "B. AI-powered systems that synthesise data to support, augment, or\nautomate complex supply chain decisions", "C. Blockchain's ability to verify decisions on an immutable ledger", "D. IoT devices making decisions without human input"], "answer": "B", "explanation": "Decision intelligence combines AI, machine learning, and analytics to synthesise complex data and support or automate decision-making across the supply chain --- from demand forecasting to supplier selection to logistics routing."}, {"num": 97, "text": "A fashion company's supply chain team can see in real time which styles\nare selling fastest in each city. They use this to trigger additional\nproduction of fast-sellers and cancel slow-sellers within 48 hours.\nWhich technology enables this agility?", "options": ["A. Push-based production with advanced forecasting", "B. Real-time data analytics from POS systems feeding into an AI-driven\ndemand-sensing platform", "C. Centralised warehousing with large safety stock", "D. Blockchain-verified fashion authentication"], "answer": "B", "explanation": "Real-time POS data feeding into AI-driven demand sensing is what enables 48-hour response. This is Digitally Transformed supply chain management --- demand intelligence driving autonomous production and cancellation decisions."}, {"num": 98, "text": "A company's Chief Supply Chain Officer says: \"Our supply chain\ntechnology is now a strategic backbone, not just an efficiency tool.\"\nThis statement signals a shift from which maturity level to which?", "options": ["A. Digitally Immature to Digitally Enabled", "B. Digitally Enabled to Digitally Transformed", "C. Digitally Transformed to Digitally Enabled", "D. Traditional to Digitally Immature"], "answer": "B", "explanation": "The maturity model table in your lectures explicitly contrasts Digitally Enabled (technology as \"efficiency tool\") versus Digitally Transformed (technology as \"strategic backbone\"). The CSCO's statement describes this exact transition."}, {"num": 99, "text": "Which of the following best describes how cloud computing supports\nglobal supply chain collaboration?", "options": ["A. It replaces the need for physical warehouses", "B. It provides a shared, scalable platform where all global supply chain\npartners can access the same real-time data and tools", "C. It enables blockchain transactions without internet connectivity", "D. It eliminates the need for AI in supply chains"], "answer": "B", "explanation": "Cloud computing provides a shared infrastructure accessible from anywhere, enabling all global partners to collaborate on the same real-time data. This is critical for coordinating complex, multi-party global supply chains."}, {"num": 100, "text": "A company's smart logistics system automatically selects the best\ncarrier for each shipment based on cost, speed, carbon footprint, and\nreliability --- evaluating thousands of options in seconds. This is an\nexample of:", "options": ["A. Manual logistics management using spreadsheets", "B. AI-powered logistics optimisation --- a core component of a digital\nsupply chain", "C. Blockchain carrier verification", "D. IoT condition monitoring\n\nSECTION: AI & EXPLAINABLE AI"], "answer": "B", "explanation": "AI-powered logistics optimisation --- automatically evaluating thousands of carrier options across multiple criteria in real time --- is a key AI application in supply chain logistics, as covered in your digital supply chain technology lectures. AI & EXPLAINABLE AI"}, {"num": 101, "text": "A supply chain manager receives an AI recommendation to switch to a\ncheaper supplier but cannot understand why the system made this\nrecommendation. She therefore ignores it. This scenario illustrates the\ncore problem that which technology is designed to solve?", "options": ["A. Blockchain", "B. Digital Twin", "C. Explainable AI (XAI)", "D. IoT condition monitoring"], "answer": "C", "explanation": "Traditional AI acts as a \"black box\" --- it produces decisions without explainable reasoning. Explainable AI (XAI) bridges this gap by providing human-interpretable reasoning behind AI decisions, building manager trust and enabling adoption."}, {"num": 102, "text": "UPS's AI system recommends a specific delivery route and explains:\n\"This route avoids the high-traffic M50 corridor and reduces fuel\nconsumption by 15% compared to the alternative.\" This is a real-world\napplication of:", "options": ["A. Blockchain smart contracts", "B. Digital Twin simulation", "C. Explainable AI (XAI) for logistics route optimisation", "D. IoT condition monitoring"], "answer": "C", "explanation": "The UPS XAI example is directly cited in your Lecture 6 slides. The system not only recommends a route but provides transparent reasoning (traffic avoidance + 15% fuel savings) --- making it interpretable and trustworthy for managers."}, {"num": 103, "text": "An AI model recommends that a retailer increase its safety stock of\nProduct X by 35% ahead of the holiday season. The supply chain manager\nasks: \"Why this amount?\" According to XAI principles, what should the\nsystem be able to provide?", "options": ["A. Only the recommendation without explanation", "B. A clear, human-interpretable explanation of which factors drove the\nrecommendation (e.g., demand trend, lead time variability, historical\nstockout rate)", "C. A blockchain verification of the recommendation", "D. A digital twin simulation as the only form of explanation"], "answer": "B", "explanation": "XAI for inventory management should explain why certain safety stock levels are recommended --- identifying the factors (demand seasonality, supplier lead time variability, historical stockout rates) that drove the AI's calculation."}, {"num": 104, "text": "An AI flags a financial transaction in a supply chain as potentially\nfraudulent. The compliance team asks for justification before blocking\nthe transaction. Which XAI principle is being applied?", "options": ["A. Inventory optimisation", "B. Fraud detection with explainability --- ensuring flagged cases are\njustified based on relevant risk indicators", "C. Route optimisation", "D. Demand forecasting"], "answer": "B", "explanation": "XAI for fraud detection ensures that flagged transactions are justified based on interpretable risk indicators (unusual payment patterns, new counterparty, abnormal amount), not just an unexplained algorithmic flag --- critical for compliance."}, {"num": 105, "text": "The EU AI Act requires transparency in AI decision-making for high-risk\napplications. How does this regulation directly impact AI adoption in\nsupply chains?", "options": ["A. It bans AI in supply chain decision-making entirely", "B. It requires supply chains using AI for significant decisions to\nimplement Explainable AI to comply with transparency mandates", "C. It mandates blockchain for all supply chain AI", "D. It only applies to consumer-facing AI"], "answer": "B", "explanation": "The EU AI Act mandates transparency and interpretability for high-risk AI applications. Supply chain decisions (supplier selection, logistics, risk management) that impact operations significantly require XAI to demonstrate compliance with these regulations."}, {"num": 106, "text": "A supply chain AI model trained on historical purchase data consistently\nrecommends avoiding suppliers from a specific region due to past delays\n--- but the delays were caused by a one-time natural disaster, not\nongoing unreliability. This is an example of:", "options": ["A. Effective risk management", "B. Algorithmic bias --- AI overweighting historical data that no longer\nreflects current conditions", "C. Accurate predictive analytics", "D. Correct application of the bullwhip effect"], "answer": "B", "explanation": "AI models can perpetuate bias from historical data. XAI is needed to detect and correct this --- managers must understand why the AI is penalising a supplier so they can identify and correct the flawed data causing the bias."}, {"num": 107, "text": "SHAP (SHapley Additive exPlanations) and LIME (Local Interpretable\nModel-agnostic Explanations) are mentioned in your lectures. What is\ntheir primary function in supply chain AI?", "options": ["A. They are blockchain consensus mechanisms", "B. They are AI explainability techniques that identify which factors\nmost influenced a specific AI decision", "C. They are IoT sensor calibration protocols", "D. They are digital twin modelling frameworks"], "answer": "B", "explanation": "SHAP and LIME are explainability techniques cited in your Lecture 6 slides. They identify and quantify which input variables most influenced a specific AI output --- making the reasoning behind AI supply chain decisions interpretable to humans."}, {"num": 108, "text": "A supplier selection AI evaluates 500 potential suppliers and recommends\nthe top 5. The procurement manager wants to know why Supplier A was\nranked first. Which of the following would XAI provide?", "options": ["A. A list of all 500 suppliers ranked by cost only", "B. An explanation showing which factors (e.g., price: 40% weight,\nreliability: 35%, ESG: 25%) drove Supplier A's top ranking", "C. A blockchain verification of Supplier A's identity", "D. A digital twin simulation of working with Supplier A"], "answer": "B", "explanation": "XAI for supplier selection explains which factors (price, reliability, ESG compliance) and their relative weights drove the recommendation. This allows managers to verify, question, or accept the AI's reasoning with confidence."}, {"num": 109, "text": "JD.com faced increasing consumer demand uncertainty and a bullwhip\neffect that caused inefficient upstream production. Its AI-powered\nSupply Chain Control Tower 2.0 addressed this by:", "options": ["A. Eliminating all suppliers and vertically integrating production", "B. Providing real-time end-to-end supply chain visibility, predictive\nanalytics, and intelligent automation across procurement, sales, and\nlogistics", "C. Implementing a push-based production model with large batch runs", "D. Replacing human managers with fully autonomous robots"], "answer": "B", "explanation": "JD.com's Control Tower 2.0 (\"brain\") created real-time visibility across all supply chain nodes, used AI for predictive analytics, and automated key decisions --- directly addressing the bullwhip effect caused by information opacity and manual errors."}, {"num": 110, "text": "AI in supply chain demand forecasting goes beyond simple trend-line\nprojection. Which of the following capabilities does AI bring that\ntraditional statistical forecasting cannot?", "options": ["A. Manual data entry from sales reports", "B. Processing massive multi-variable datasets (weather, social media\ntrends, economic indicators, competitor actions) in real time to\ngenerate dynamic forecasts", "C. Forecasting only at the annual level", "D. Eliminating the need for any human input in the forecasting process"], "answer": "B", "explanation": "AI demand forecasting analyses vast, varied datasets simultaneously --- including unconventional signals like weather and social media --- to produce more accurate, dynamic forecasts than statistical models which rely only on historical sales data."}, {"num": 111, "text": "A supply chain manager at a manufacturing firm says: \"I don't trust\nour AI's recommendations because I can't see the reasoning.\" Which of\nthe following actions would most directly resolve this concern?", "options": ["A. Replace the AI with a simpler spreadsheet model", "B. Implement XAI --- adding an explainability layer that shows the\nfactors, weights, and logic behind each AI recommendation", "C. Hire more data scientists to review AI outputs", "D. Switch to a blockchain-based decision system"], "answer": "B", "explanation": "The manager's concern is exactly what XAI is designed to address. Adding explainability to the AI system --- showing why each recommendation was made --- builds trust and enables managers to understand, verify, and act on AI insights."}, {"num": 112, "text": "AI systems in supply chains are described as enabling \"neurosymbolic\nAI.\" What does this mean?", "options": ["A. AI that uses brain scans to predict supply chain demand", "B. A combination of symbolic (logic-based) reasoning and neural network\n(deep learning) approaches that provides both interpretability and\npattern recognition", "C. AI exclusively used in medical supply chains", "D. AI that controls robotic systems in smart warehouses"], "answer": "B", "explanation": "Neurosymbolic AI combines symbolic reasoning (rule-based logic that humans can understand) with neural networks (pattern recognition from data). In supply chains, this provides both powerful prediction AND human-interpretable reasoning --- the best of both approaches."}, {"num": 113, "text": "An AI demand forecasting system predicts a 40% sales increase for\nProduct Y next month. The supply chain team acts on this, builds\ninventory, but actual sales are flat. Which XAI capability would have\nbeen most valuable here?", "options": ["A. Blockchain verification of the forecast", "B. An explanation of why the AI predicted the 40% increase (e.g., it\nover-weighted a one-time social media spike) --- enabling managers to\nchallenge the forecast before acting", "C. A digital twin of the product lifecycle", "D. IoT tracking of current inventory levels"], "answer": "B", "explanation": "XAI for demand forecasting allows managers to understand the rationale behind predictions. If the AI's reasoning (a temporary social media spike) is visible, managers can challenge and adjust the forecast before committing to inventory build-up."}, {"num": 114, "text": "Which of the following best describes the relationship between AI and\nXAI in supply chain management?", "options": ["A. XAI replaces AI --- they cannot be used together", "B. AI generates powerful but opaque recommendations; XAI adds an\ninterpretability layer so humans can understand, trust, and validate\nthose recommendations", "C. XAI is a blockchain application for AI data security", "D. AI is used for logistics; XAI is only used for finance"], "answer": "B", "explanation": "AI and XAI work together: AI provides the analytical power (processing vast data, identifying patterns), while XAI adds the transparency layer that allows supply chain managers to understand, trust, and act on AI recommendations."}, {"num": 115, "text": "A humanitarian aid organisation uses AI to predict demand for emergency\nsupplies (food, medicine, shelter) in disaster zones. Which supply chain\nsector application does this represent?", "options": ["A. Healthcare supply chain", "B. Cold supply chain", "C. Humanitarian supply chain --- AI predicts demand for essential\nsupplies in disaster response and optimises resource allocation", "D. Maritime supply chain"], "answer": "C", "explanation": "Your lecture slides explicitly list AI in humanitarian supply chains as predicting demand for essential supplies in disaster response, optimising logistics, and improving coordination in global humanitarian efforts."}, {"num": 116, "text": "An agricultural company uses AI to analyse satellite imagery, soil\nsensor data, and weather forecasts to predict crop yields and schedule\nharvesting. This is an example of:", "options": ["A. AI in healthcare supply chains", "B. AI in agricultural supply chains --- crop yield prediction and\nharvest scheduling optimisation", "C. Blockchain in food traceability", "D. Digital twin in cold chain management"], "answer": "B", "explanation": "AI in agricultural supply chains includes crop yield prediction (using satellite and sensor data), pest detection, and harvest scheduling optimisation --- exactly as described in your Lecture 6 slides."}, {"num": 117, "text": "A port operator uses AI predictive analytics to forecast vessel arrival\ntimes, pre-assign berths, and schedule crane operations before ships\narrive. This reduces port congestion by 30%. This is an example of:", "options": ["A. AI in cold supply chain management", "B. AI in maritime supply chain --- optimising docking schedules and\nreducing congestion", "C. Blockchain for shipping documentation", "D. Digital twin of port operations"], "answer": "B", "explanation": "AI predictive analytics in maritime supply chains optimises docking schedules, reduces congestion, and minimises waiting times --- as directly listed in your Lecture 6 AI in different supply chain sectors slides."}, {"num": 118, "text": "A retail chain uses AI to dynamically adjust the price of perishable\ngoods (fresh produce) throughout the day --- reducing price as the\nsell-by date approaches to maximise sales and minimise waste. This is:", "options": ["A. AI in humanitarian supply chains", "B. AI-driven dynamic pricing in retail supply chains", "C. Blockchain-verified pricing", "D. Smart factory predictive maintenance"], "answer": "B", "explanation": "AI-driven dynamic pricing in retail is explicitly listed in your slides. Adjusting prices in real time based on remaining shelf life, demand rate, and inventory levels maximises revenue while minimising waste --- a powerful AI supply chain application."}, {"num": 119, "text": "Which key AI technologies are listed in your lectures as the building\nblocks for supply chain AI applications?", "options": ["A. Blockchain, IoT, and Cloud Computing", "B. Machine Learning, Neural Networks, NLP, and Computer Vision", "C. Digital Twins, Additive Manufacturing, and Smart Factories", "D. ERP, CRM, and WMS systems"], "answer": "B", "explanation": "Your Lecture 6 slides list Machine Learning, Neural Networks, NLP (Natural Language Processing), and Computer Vision as the key AI technologies enabling supply chain applications from forecasting to quality inspection to chatbots."}, {"num": 120, "text": "An AI-powered computer vision system in a food manufacturing plant scans\nevery product on the production line and automatically rejects items\nwith visual defects. This reduces waste and improves quality without\nslowing production. This is:", "options": ["A. IoT-based condition monitoring", "B. AI-powered quality control and inspection using computer vision", "C. Blockchain product authentication", "D. Digital twin quality simulation"], "answer": "B", "explanation": "AI-powered computer vision for quality control and inspection is a dedicated topic in your Lecture 6 slides. Real-time automated defect detection enhances quality assurance, reduces manual inspection costs, and minimises waste in manufacturing."}, {"num": 121, "text": "Future trends in AI for supply chain include \"AI-Driven\nSustainability\" and \"AI in Circular Economy.\" What do these terms\nimply?", "options": ["A. AI will be powered by renewable energy sources", "B. AI will optimise logistics to reduce carbon emissions (green\nlogistics) and help manage waste reduction and sustainable sourcing\n(circular economy)", "C. AI will replace all human workers in the supply chain", "D. AI will eliminate the need for physical infrastructure"], "answer": "B", "explanation": "AI-Driven Sustainability refers to using AI to reduce carbon emissions through logistics optimisation (green logistics). AI in Circular Economy means using AI to support waste reduction, reverse logistics, and sustainable sourcing --- as listed in your lecture's future trends."}, {"num": 122, "text": "JD.com partnered with over 30,000 suppliers and faced \"manual\ndecision-making resulting in increasing errors and delays.\" The AI\nControl Tower 2.0 resolved this primarily by:", "options": ["A. Reducing the number of suppliers to 100", "B. Automating key supply chain decisions using AI, big data, and\nreal-time visibility --- reducing manual intervention and errors", "C. Implementing a push-based production model", "D. Building more centralised warehouses"], "answer": "B", "explanation": "JD.com's Control Tower 2.0 used AI and big data to automate procurement, logistics, and demand decisions that were previously made manually. This reduced human errors, improved speed, and created an intelligent, self-adjusting supply chain."}, {"num": 123, "text": "A pharmaceutical cold chain uses AI-powered IoT sensors that predict\ntemperature excursion risks based on ambient temperature trends, traffic\ndelays, and storage conditions --- alerting the driver before a breach\noccurs. This is an example of:", "options": ["A. Reactive supply chain management", "B. Predictive AI in cold supply chains --- preventing problems before\nthey occur rather than reacting after", "C. Push-based inventory management", "D. Blockchain provenance tracking"], "answer": "B", "explanation": "Predictive AI anticipates problems before they materialise. In cold supply chains, predicting temperature excursion risks before they occur (based on trends and conditions) enables proactive intervention --- saving product integrity and complying with regulations."}, {"num": 124, "text": "An AI supplier risk model flags a key supplier as \"high risk\" based on\nfinancial distress indicators. The procurement team immediately asks:\n\"What specifically makes them high risk?\" This question reflects the\nneed for:", "options": ["A. Blockchain audit trail", "B. Digital twin simulation of the supplier", "C. Explainable AI --- transparent reasoning showing which risk\nindicators (e.g., declining credit score, late payments, capacity\nreduction) flagged the supplier", "D. Push-based alternative sourcing"], "answer": "C", "explanation": "XAI for supplier risk management must explain which specific risk indicators triggered the high-risk flag. Without this, procurement teams cannot verify the AI's assessment, understand its severity, or plan an appropriate response."}, {"num": 125, "text": "According to your lectures, which of the following is a core reason why\nsupply chain managers might HESITATE to adopt AI recommendations?", "options": ["A. AI recommendations are always wrong", "B. AI recommendations cannot be trusted or acted upon when managers\ncannot understand the reasoning behind them --- the black box problem", "C. AI is too expensive to implement", "D. AI only works for large companies"], "answer": "B", "explanation": "Your Lecture 6 slides explicitly state that if AI-driven recommendations cannot be explained, organisations might hesitate to adopt them. Trust requires transparency --- which is why XAI is essential for supply chain AI adoption."}, {"num": 126, "text": "A manufacturing company uses AI for predictive maintenance. The AI\nrecommends shutting down Machine 7 for maintenance in 3 days to prevent\na breakdown. The plant manager asks why. XAI shows: \"Vibration\nfrequency has increased 23% over baseline; historical data shows this\npattern precedes bearing failure in 85% of cases.\" This demonstrates:", "options": ["A. Blockchain supply chain transparency", "B. XAI providing interpretable, evidence-based reasoning for a\nmaintenance decision --- enabling the manager to trust and act on it", "C. Digital twin simulation of machine failure", "D. IoT tracking of machine location"], "answer": "B", "explanation": "This is a textbook XAI example: the AI provides not just the recommendation (shut down in 3 days) but the specific evidence and historical pattern behind it (23% vibration increase, 85% historical failure rate). This makes the recommendation trustworthy and actionable."}, {"num": 127, "text": "Which of the following future trends in AI for supply chain involves AI\nand Digital Twin technologies working together?", "options": ["A. Autonomous Supply Chains with robotic warehouses", "B. AI & Digital Twins: real-time simulation and optimisation --- using\nAI to power live digital replicas that continuously adapt", "C. Blockchain & AI integration for transparency", "D. AI-driven dynamic pricing in retail"], "answer": "B", "explanation": "Your lecture slides list \"AI & Digital Twins: Real-time simulation & optimisation\" as a future trend. AI powers the analytics and learning in digital twins, while digital twins provide the simulation environment for AI to optimise within."}, {"num": 128, "text": "An e-commerce company uses AI to manage inventory across 20 warehouses,\nautomatically reordering stock when levels fall below a predicted\nthreshold. The AI also explains its reorder triggers to the warehouse\nmanager. This represents:", "options": ["A. Push-based production strategy", "B. AI-driven inventory management with XAI transparency --- enabling\nboth automation and human oversight", "C. Blockchain-based automated replenishment", "D. Traditional ERP-based reorder point system"], "answer": "B", "explanation": "AI-driven inventory management automatically handles reordering (reducing stockouts and overstocking), while XAI explains the triggers to managers (transparency). This combination automates routine decisions while keeping humans in control of exceptions."}, {"num": 129, "text": "Which of the following best explains why \"Ethical AI and Bias\nReduction\" is a specific benefit of XAI in supply chain management?", "options": ["A. XAI ensures AI is powered by renewable energy", "B. XAI allows managers to detect and correct biases in AI models ---\ne.g., unfair supplier discrimination or demographic biases in demand\nforecasting", "C. XAI eliminates the need for human managers", "D. XAI is a regulatory requirement in all countries"], "answer": "B", "explanation": "XAI allows managers to see the reasoning behind AI decisions, making it possible to detect if the AI is making decisions based on biased data or unfair proxies. This enables correction before biased decisions are acted upon --- a key ethical benefit."}, {"num": 130, "text": "A logistics AI system learns from 5 years of data and recommends routes\nthat worked well historically. However, a new motorway has opened,\ncreating a faster alternative. The system keeps recommending the old\nroute. This is an example of:", "options": ["A. Effective AI learning from data", "B. Model staleness --- AI relying on outdated training data, failing to\nincorporate new real-world changes", "C. Successful XAI implementation", "D. Blockchain data immutability preventing updates"], "answer": "B", "explanation": "AI models trained on historical data can become stale when the real world changes. Regular model retraining and XAI transparency (showing why old routes are still being recommended) would expose and correct this problem."}, {"num": 131, "text": "A supply chain AI provides \"Enhanced Performance Evaluation\" as one of\nits XAI benefits. What does this mean practically for supply chain\nmanagers?", "options": ["A. XAI automatically improves KPI scores without manager involvement", "B. XAI provides insights into how AI reaches its conclusions, allowing\nmanagers to verify that AI models align with their KPIs and business\nobjectives", "C. XAI replaces the need for KPI measurement entirely", "D. XAI creates new KPIs automatically"], "answer": "B", "explanation": "XAI for performance evaluation means managers can see how the AI reaches its conclusions and verify that those conclusions are aligned with actual business KPIs. This prevents AI from optimising for proxy metrics that don't reflect real business value."}, {"num": 132, "text": "A cold chain pharmaceutical company uses AI-powered IoT sensors that\ntrack temperature fluctuations during transit. An alert fires when\ntemperature rises above 2°C. Which two technologies are working together\nhere?", "options": ["A. Blockchain and Digital Twin", "B. IoT (sensor data collection) and AI (pattern analysis and alert\ntriggering)", "C. Additive Manufacturing and Cloud Computing", "D. Smart Factory and ERP"], "answer": "B", "explanation": "IoT sensors collect real-time temperature data; AI analyses the patterns and triggers alerts when thresholds are breached. This IoT-AI combination is listed in your lecture as a specific AI application in cold supply chains."}, {"num": 133, "text": "According to your lectures, AI in manufacturing supply chains\nspecifically includes \"predictive maintenance\" and \"improving robotic\nefficiency.\" What does predictive maintenance mean?", "options": ["A. Scheduling maintenance at fixed calendar intervals regardless of\nmachine condition", "B. Using AI to analyse machine performance data and predict failures\nbefore they occur, scheduling maintenance only when needed", "C. Using robots to perform maintenance tasks autonomously", "D. Blockchain verification of maintenance records"], "answer": "B", "explanation": "Predictive maintenance uses AI to analyse real-time and historical machine data (vibration, temperature, output quality) to predict failures before they happen --- scheduling maintenance proactively rather than reactively or at arbitrary fixed intervals."}, {"num": 134, "text": "A global humanitarian organisation uses AI to optimise the allocation of\nfood and medicine across disaster zones. The AI recommends sending 60%\nof supplies to Zone A and 40% to Zone B. Aid workers ask: \"Why this\nsplit?\" This requires:", "options": ["A. Blockchain verification of supply quantities", "B. XAI explaining the reasoning (e.g., Zone A has 3x the affected\npopulation, Zone B has better local distribution infrastructure)", "C. A digital twin of the disaster zone", "D. IoT tracking of supply trucks"], "answer": "B", "explanation": "AI in humanitarian supply chains must be explainable so aid workers understand and trust allocation decisions. XAI provides the reasoning (population affected, infrastructure quality, historical need patterns) that justifies the recommended resource split."}, {"num": 135, "text": "A retail AI system generates personalised product recommendations for\neach customer based on purchase history, browsing data, and demographic\ninformation. Which AI technology primarily enables personalisation at\nthis scale?", "options": ["A. NLP (Natural Language Processing)", "B. Machine Learning and Neural Networks --- learning individual customer\npatterns from massive datasets", "C. Computer Vision --- visual product matching", "D. Blockchain customer identity verification"], "answer": "B", "explanation": "Personalised recommendations at scale are powered by Machine Learning and Neural Networks, which learn complex patterns from individual customer behaviour data to predict and recommend relevant products in real time."}, {"num": 136, "text": "An AI system in a supply chain company is described as a \"black box.\"\nWhich of the following is the MOST significant operational risk of using\nblack-box AI in supply chain decisions?", "options": ["A. The system uses too much computing power", "B. If the AI makes a wrong or biased decision, managers cannot\nunderstand why or how to fix it --- leading to operational failures that\nare hard to diagnose and correct", "C. Black-box AI is more expensive than XAI", "D. Black-box AI cannot process large datasets"], "answer": "B", "explanation": "The key risk of black-box AI is accountability and diagnosis. When something goes wrong (wrong forecast, bad supplier recommendation, routing error), managers cannot identify the cause or fix it. XAI makes AI decisions auditable and correctable."}, {"num": 137, "text": "An AI supply chain system is described as having \"enhanced resilience\nand adaptability.\" What does this mean in practice?", "options": ["A. The AI system is physically resilient to hardware failures", "B. The AI continuously learns from new data and adapts its\nrecommendations to changing conditions --- improving supply chain\nability to handle disruptions", "C. The AI requires no human oversight because it is fully\nself-sufficient", "D. The AI is embedded in a blockchain for security"], "answer": "B", "explanation": "AI enhances supply chain resilience by continuously learning from new data and adapting to changing conditions. Rather than following fixed rules, AI systems update their models as conditions evolve --- improving responses to disruptions over time."}, {"num": 138, "text": "A supply chain AI tool identifies a piracy threat to a shipping vessel\nbased on patterns in maritime AIS (Automatic Identification System)\ndata. This is an application of:", "options": ["A. Blockchain security for shipping documents", "B. AI in maritime supply chains --- identifying piracy threats and\nsecurity risks by analysing maritime data patterns", "C. Digital twin vessel simulation", "D. IoT temperature monitoring in cold chain"], "answer": "B", "explanation": "Your lecture slides specifically list AI in maritime supply chains as being used to identify piracy threats and security risks by analysing maritime data patterns --- including AIS data showing vessel movements, clustering, and anomalous behaviour."}, {"num": 139, "text": "According to your lectures, \"Autonomous Supply Chains\" are listed as a\nfuture trend in AI. What does this mean?", "options": ["A. Supply chains that operate without any digital technology", "B. AI-driven robotic warehouses and logistics systems that make and\nexecute decisions without human intervention for routine operations", "C. Supply chains that are independently owned by AI companies", "D. Supply chains where all decisions are made manually by autonomous\nwork teams"], "answer": "B", "explanation": "Autonomous Supply Chains --- a future trend listed in your lecture slides --- refer to AI-driven systems (robotic warehouses, autonomous vehicles, AI decision agents) that handle routine supply chain operations without human intervention, freeing managers for strategic decisions."}, {"num": 140, "text": "A supply chain manager reviews an AI-generated demand forecast and\nnotices it predicts 50% higher demand than historical patterns suggest.\nWith XAI, the system shows: \"Recent social media mentions of the\nproduct increased 400% over the past 2 weeks --- a leading indicator of\ndemand spikes based on training data.\" The manager can now:", "options": ["A. Reject the forecast without justification", "B. Evaluate the AI's reasoning, decide whether the social media signal\nis valid, and make an informed decision about how much to trust and act\non the forecast", "C. Accept the forecast automatically without question", "D. Escalate to the blockchain audit trail\n\nSECTION: BLOCKCHAIN"], "answer": "B", "explanation": "XAI enables informed human oversight. By seeing the reasoning (social media leading indicator), the manager can evaluate its validity, consider other factors, and make a calibrated decision about whether to act on the full forecast or adjust it. BLOCKCHAIN"}, {"num": 141, "text": "A food retailer wants to trace the origin of a contaminated batch of\nlettuce. Using traditional supply chain records, the process takes 7\ndays. With blockchain, it takes 2 seconds. What property of blockchain\nmakes this possible?", "options": ["A. Decentralisation prevents single-point failures", "B. Immutable, shared ledger records every transaction from farm to shelf\n--- enabling instant provenance tracking at any point in the chain", "C. Smart contracts automate payment at point of contamination", "D. AI integration predicts contamination before it occurs"], "answer": "B", "explanation": "Blockchain's immutable, shared ledger records every transaction across all supply chain stages. All participants access the same verified record --- enabling instant tracing of any product's journey from origin to shelf. Walmart's food safety tracking (mentioned in lectures) achieves this."}, {"num": 142, "text": "Satoshi Nakamoto developed blockchain technology in 2008 as the\nfoundation for which application, before its use expanded to supply\nchains?", "options": ["A. Cloud computing platforms", "B. Bitcoin cryptocurrency", "C. Internet of Things networks", "D. Digital Twin technology"], "answer": "B", "explanation": "Blockchain was originally developed by Satoshi Nakamoto in 2008 as the underlying technology for Bitcoin. Its properties (decentralisation, immutability, transparency) made it valuable for supply chain applications beyond cryptocurrency."}, {"num": 143, "text": "A supply chain blockchain is described as a \"decentralised distributed\nledger.\" What does this mean in practice for supply chain partners?", "options": ["A. All supply chain data is stored on one central company's server", "B. Transaction records are distributed across multiple computers\n(nodes), with no single entity controlling the ledger --- all authorised\nparticipants see the same verified record", "C. Only the largest company in the supply chain controls the ledger", "D. Transactions are stored on individual companies' private servers\nwith no sharing"], "answer": "B", "explanation": "Decentralised means no single central authority controls the ledger. Distributed means records exist across multiple nodes. Every authorised participant sees the same verified, tamper-proof transaction history --- eliminating single points of control and failure."}, {"num": 144, "text": "Unilever deployed blockchain using GreenToken by SAP to track palm oil\nin its supply chain. Which supply chain problem was this specifically\ndesigned to solve?", "options": ["A. Reducing warehouse automation costs", "B. Ensuring palm oil comes from responsible, sustainable sources and\ndoes not contribute to rainforest loss --- enabling ethical sourcing\nverification", "C. Speeding up payment terms with suppliers", "D. Reducing cold chain temperature excursions"], "answer": "B", "explanation": "Unilever's GreenToken implementation is the blockchain case study in your lectures. The specific problem: verifying that palm oil is sustainably and responsibly sourced without contributing to deforestation --- a key ESG governance challenge."}, {"num": 145, "text": "A smart contract is triggered when a shipment's IoT sensor confirms\ndelivery at the customer's warehouse --- automatically releasing\npayment to the supplier without manual intervention. This demonstrates:", "options": ["A. AI demand forecasting", "B. Blockchain smart contracts enabling automated, condition-based\ntransaction execution", "C. Digital twin supply chain optimisation", "D. Cloud computing payment processing"], "answer": "B", "explanation": "Smart contracts are self-executing contracts with pre-defined conditions. When the IoT confirmation triggers the contractual condition (delivery confirmed), the blockchain automatically executes the payment --- eliminating manual processing and disputes."}, {"num": 146, "text": "Pfizer, AbbVie, and Genentech are using blockchain in their supply\nchains primarily to:", "options": ["A. Reduce manufacturing costs through automation", "B. Combat counterfeit drugs in the pharmaceutical supply chain", "C. Manage cold chain temperature compliance", "D. Track sales data from pharmacies"], "answer": "B", "explanation": "Your lecture slides specifically name Pfizer, AbbVie, and Genentech as pharmaceutical companies using blockchain to combat counterfeit drugs. Blockchain's immutability and traceability make counterfeit products identifiable throughout the supply chain."}, {"num": 147, "text": "In a blockchain supply chain, \"immutability\" means:", "options": ["A. The blockchain can be updated by any participant at any time", "B. Once a transaction is recorded on the blockchain, it cannot be\naltered or deleted --- providing a permanent, tamper-proof record", "C. Only the creator of the blockchain can modify records", "D. Records expire after a set period"], "answer": "B", "explanation": "Immutability is a core blockchain property: once a block is added to the chain, it cannot be changed without invalidating all subsequent blocks. This creates a permanent, tamper-proof audit trail --- critical for supply chain traceability and fraud prevention."}, {"num": 148, "text": "Maersk and IBM use blockchain for shipping and logistics. Which supply\nchain challenges does this partnership primarily address?", "options": ["A. Reducing manufacturing defects", "B. Enhancing transparency in international shipping and improving\ndocumentation efficiency --- reducing paperwork and delays", "C. Managing cold chain temperature compliance", "D. Automating customer service chatbots"], "answer": "B", "explanation": "Maersk & IBM's blockchain platform (mentioned in your lectures) addresses the complexity of international shipping documentation --- bills of lading, customs forms, certificates of origin --- by creating a shared, transparent, digital record that reduces paperwork and processing delays."}, {"num": 149, "text": "A supply chain faces \"difficulty in tracking product provenance,\nleading to quality and compliance issues.\" Which blockchain feature\ndirectly addresses this?", "options": ["A. Decentralisation", "B. Smart contracts", "C. Provenance tracking through an immutable, shared ledger recording\nevery step from production to consumer", "D. Enhanced security through cryptographic techniques"], "answer": "C", "explanation": "Provenance tracking --- knowing exactly where a product came from and every step of its journey --- is one of blockchain's primary supply chain applications. Every transfer of custody is recorded, creating a complete, unalterable history."}, {"num": 150, "text": "A retail company implements blockchain-based stock replenishment. When\ninventory of Product X falls below a threshold (confirmed by IoT), a\nblockchain smart contract automatically triggers an order to the\nsupplier. The supplier confirms receipt on-chain. What is the key\nbenefit?", "options": ["A. Reduced need for demand forecasting", "B. Automated, transparent, and tamper-proof replenishment with instant\nsupplier confirmation --- eliminating manual ordering and disputes", "C. Lower product manufacturing costs", "D. Better customer marketing data"], "answer": "B", "explanation": "Combining IoT (inventory trigger), blockchain (transparent order record), and smart contracts (automated execution) creates an automated replenishment system where every step is recorded, verified, and tamper-proof --- reducing manual effort and disputes."}, {"num": 151, "text": "A humanitarian aid organisation uses blockchain to track aid\ndistribution in disaster zones. Which supply chain problem is this\nsolving?", "options": ["A. Reducing shipping emissions", "B. Preventing fraud and mismanagement of aid --- ensuring supplies reach\nintended recipients through transparent, verifiable distribution records", "C. Speeding up product manufacturing", "D. Cold chain temperature compliance"], "answer": "B", "explanation": "Blockchain in humanitarian supply chains specifically addresses fraud and mismanagement in aid distribution. Every distribution event is recorded on an immutable, transparent ledger --- making it virtually impossible to falsify records or divert supplies."}, {"num": 152, "text": "Which of the following is a KEY CHALLENGE in implementing blockchain in\nsupply chains?", "options": ["A. Blockchain is too fast for supply chain use cases", "B. High computational costs, scalability limitations, and resistance to\nchange among traditional supply chain partners", "C. Blockchain cannot be integrated with IoT", "D. Blockchain only works for financial transactions"], "answer": "B", "explanation": "Your Lecture 7 slides list: high computational costs and scalability issues, lack of standardisation, resistance from traditional supply chain players, and integration challenges with legacy systems as key blockchain implementation challenges."}, {"num": 153, "text": "A cold supply chain uses blockchain to record every temperature reading,\nlocation update, and custody transfer for a vaccine shipment from\nmanufacturer to hospital. Which blockchain property is most critical for\npharmaceutical regulatory compliance?", "options": ["A. Smart contract automation", "B. Decentralisation allowing any party to update records", "C. Immutability --- regulators can verify that temperature and custody\nrecords have never been altered", "D. Cryptocurrency payment integration"], "answer": "C", "explanation": "For pharmaceutical regulatory compliance, immutability is critical. Regulators need assurance that cold chain temperature and custody records accurately reflect what actually happened --- and that no party has falsified them after the fact."}, {"num": 154, "text": "A small clothing brand uses blockchain to show consumers that each\ngarment was ethically produced, with records from raw material sourcing\nthrough manufacturing to shipping. This is described in your lectures\nas:", "options": ["A. Humanitarian supply chain management", "B. Provenance tracing for ethical sourcing and sustainability ---\nsimilar to Provenance (UK startup) tracking product origins", "C. Blockchain in financial supply chains", "D. Cold chain compliance management"], "answer": "B", "explanation": "Provenance (UK startup) is listed in your lectures as tracking product origins to enhance sustainability and ethical sourcing --- exactly what the clothing brand is doing. Blockchain creates a verifiable, transparent record of the ethical supply chain journey."}, {"num": 155, "text": "What is the PRIMARY objective of blockchain technology as described in\nyour lectures?", "options": ["A. To replace all existing supply chain management systems with\ncryptocurrency", "B. To ensure transparency, security, immutability, and efficiency in\ndigital transactions, reducing fraud, errors, and inefficiencies", "C. To exclusively manage financial payments between companies", "D. To replace human decision-making with automated blockchain protocols"], "answer": "B", "explanation": "Your Lecture 7 slides state the primary blockchain objective as: ensuring transparency, security, immutability, and efficiency in digital transactions, thereby reducing fraud, errors, and inefficiencies --- covering both commercial and supply chain applications."}, {"num": 156, "text": "A supply chain uses blockchain to eliminate multiple intermediary\nbrokers who previously verified and matched buyers with sellers of\ncommodities. What blockchain principle enables this disintermediation?", "options": ["A. Immutability prevents price changes", "B. Decentralisation eliminates the need for a trusted central authority\n--- all parties can transact directly using the verified blockchain\nrecord", "C. Smart contracts require human broker intervention", "D. Transparency requires all transactions to be publicly visible"], "answer": "B", "explanation": "Blockchain eliminates intermediaries by providing a trusted, shared record without needing a central authority to verify it. Buyers and sellers can transact directly, confident that the blockchain record is accurate --- reducing costs and delays from brokers."}, {"num": 157, "text": "In supply chain finance, blockchain is used to \"improve access to\nfinance for SMEs and reduce fraud risks in financial transactions.\" How\ndoes blockchain achieve the SME financing benefit?", "options": ["A. By providing free loans to small businesses", "B. By creating verifiable, immutable records of invoices and deliveries\n--- giving lenders confidence to finance SMEs against verified supply\nchain transactions", "C. By replacing banks entirely with blockchain payments", "D. By reducing the cost of manufacturing for SMEs"], "answer": "B", "explanation": "SMEs often struggle to access finance because lenders can't verify their supply chain transactions. Blockchain's immutable records of deliveries and invoices provide verified proof of business activity, giving lenders confidence to extend financing."}, {"num": 158, "text": "An agricultural supply chain uses blockchain for \"farm-to-table\ntraceability.\" If a food contamination outbreak occurs, which\nstakeholders can immediately access the chain of custody data?", "options": ["A. Only the retailer", "B. Only the original farmer", "C. All authorised participants in the blockchain network --- retailer,\ndistributor, processor, and farmer --- can access the same shared record\nsimultaneously", "D. Only the government regulator"], "answer": "C", "explanation": "Blockchain's shared, transparent ledger means all authorised supply chain participants access the same data simultaneously. In a contamination event, the retailer, distributor, processor, and farmer can all immediately trace the source --- enabling instant recall and corrective action."}, {"num": 159, "text": "A manufacturer considers blockchain but their IT team says it is\ndifficult to integrate with their existing ERP system. This is an\nexample of which blockchain implementation challenge?", "options": ["A. High computational costs", "B. Lack of standardisation", "C. Integration challenges with legacy systems and existing supply chain\ninfrastructure", "D. Resistance to change"], "answer": "C", "explanation": "Integration challenges with legacy systems --- ERP, WMS, and other existing IT infrastructure --- are specifically listed as a blockchain implementation challenge in your Lecture 7 slides. Legacy systems often require significant middleware or API development to connect with blockchain platforms."}, {"num": 160, "text": "A future trend in blockchain supply chains involves \"Integration with\nAI and IoT.\" How would this combined system work?", "options": ["A. AI replaces blockchain; IoT replaces the supply chain", "B. IoT collects real-time supply chain data; AI analyses it to generate\ninsights; blockchain records the verified transactions and automates\ncontract execution", "C. Blockchain stores all AI training data exclusively", "D. IoT sends data only to blockchain with no AI involvement"], "answer": "B", "explanation": "In an integrated system: IoT sensors collect real-time data (location, temperature, quality), AI analyses patterns and generates recommendations, and blockchain records the verified transactions and executes smart contracts automatically --- a powerful, trustworthy, self-managing supply chain."}, {"num": 161, "text": "Walmart implemented blockchain-based food safety tracking. Which\nspecific problem did this address?", "options": ["A. Reducing Walmart's manufacturing costs", "B. Ensuring contamination-free product tracking --- enabling instant\nidentification of the source of contaminated food rather than days of\nmanual tracing", "C. Managing cold chain temperature compliance for frozen goods", "D. Reducing employee theft in stores"], "answer": "B", "explanation": "Your lectures specifically mention Walmart implementing blockchain-based food safety tracking to ensure contamination-free products --- reducing the time to trace a contaminated food source from days to seconds."}, {"num": 162, "text": "A blockchain network for supply chain uses \"cryptographic techniques to\nprotect data from unauthorised access.\" This feature is called:", "options": ["A. Immutability", "B. Smart contracts", "C. Enhanced security through cryptography", "D. Decentralisation"], "answer": "C", "explanation": "Enhanced Security through cryptographic techniques is one of the 5 key features of blockchain listed in your Lecture 7 slides. Cryptography ensures that only authorised participants can access blockchain data and that records cannot be tampered with."}, {"num": 163, "text": "A luxury goods company uses blockchain to attach a unique digital\nidentity to each handbag at the point of manufacture. Customers can scan\na QR code to verify authenticity throughout the product's life. This\nprimarily addresses which supply chain problem?", "options": ["A. Demand forecasting inaccuracy", "B. Counterfeiting --- blockchain proves product authenticity through an\nimmutable digital identity linked to the physical item", "C. Warehouse automation inefficiency", "D. Supplier payment delays"], "answer": "B", "explanation": "Blockchain-based product authentication using unique digital identities (linked to physical items via QR codes or NFC chips) enables verification of authenticity at any point in the product's life --- a powerful anti-counterfeiting measure in luxury goods."}, {"num": 164, "text": "A maritime shipping company uses blockchain to \"enhance international\nshipping transparency, reduce paperwork, and ensure compliance with\ntrade laws.\" Historically, a single container shipment required up to\n200 documents from 30 different parties. Blockchain addresses this by:", "options": ["A. Physically eliminating the need for paper", "B. Digitising and sharing all shipping documents on a single immutable,\ntransparent blockchain platform accessible to all parties ---\neliminating redundant documentation and delays", "C. Replacing customs officials with smart contracts", "D. Using AI to fill in shipping forms automatically"], "answer": "B", "explanation": "International shipping documentation involves massive paperwork from multiple parties (shippers, ports, customs, insurers). Blockchain provides a single shared platform where all documents are digitally recorded and accessible --- dramatically reducing duplication, errors, and processing time."}, {"num": 165, "text": "A supply chain faces \"high costs due to multiple intermediaries and\nredundant processes.\" Blockchain addresses this by:", "options": ["A. Replacing all intermediaries with AI systems", "B. Eliminating the need for trust intermediaries --- all parties can\nrely on the blockchain's verified, shared record, removing redundant\nverification steps and their associated costs", "C. Mandating fewer supply chain stages", "D. Centralising all supply chain operations in one facility"], "answer": "B", "explanation": "Blockchain eliminates the need for multiple trust intermediaries (brokers, notaries, clearing houses) by providing a shared, verified record that all parties trust. This removes redundant processes and their costs without requiring centralisation."}, {"num": 166, "text": "A closed-loop supply chain uses blockchain to \"track products from\nproduction to recycling, reduce waste, and ensure proper disposal and\nrefurbishment.\" What type of supply chain is this?", "options": ["A. Push-based supply chain", "B. Cold supply chain", "C. Circular economy supply chain --- where blockchain enables end-to-end\ntracking including reverse logistics and recycling", "D. Humanitarian supply chain"], "answer": "C", "explanation": "Closed-loop or circular supply chains manage products through their entire lifecycle including return, recycling, and reuse. Blockchain enables tracking products from manufacture through disposal, ensuring materials are properly recycled or refurbished --- supporting circular economy objectives."}, {"num": 167, "text": "A company's supply chain blockchain project fails because their main\nsupplier refuses to join the platform. Which blockchain implementation\nchallenge does this represent?", "options": ["A. High computational costs", "B. Scalability limitations", "C. Resistance to change and adoption barriers among traditional supply\nchain players", "D. Integration with legacy systems"], "answer": "C", "explanation": "One of the most practical blockchain implementation challenges is resistance from existing supply chain partners who are reluctant to change established processes, share data, or invest in new systems. Blockchain only delivers value when all key participants adopt it."}, {"num": 168, "text": "What distinguishes blockchain from a traditional database in the context\nof supply chain management?", "options": ["A. Blockchain is faster than any database", "B. Unlike traditional databases controlled by one party, blockchain is\ndecentralised, transparent, and immutable --- no single party can alter\nrecords, and all authorised parties see the same data", "C. Traditional databases cannot store supply chain data", "D. Blockchain stores only financial data"], "answer": "B", "explanation": "Traditional databases are controlled by one entity and can be altered. Blockchain is decentralised (no single controller), transparent (shared among participants), and immutable (records cannot be altered) --- fundamentally different properties that enable trustless supply chain collaboration."}, {"num": 169, "text": "A pharmaceutical distributor uses blockchain to scan and record each\ndrug's serial number at every stage: manufacturer → wholesaler →\npharmacy → patient. A counterfeit drug is identified by a pharmacist.\nUsing the blockchain, they can immediately:", "options": ["A. Manufacture a replacement drug via blockchain", "B. Trace the exact point in the supply chain where the counterfeit\nentered, identify all affected batches, and notify relevant parties in\nseconds", "C. Only report the counterfeit to police after 30 days", "D. Identify the counterfeit only if it was the last transaction recorded"], "answer": "B", "explanation": "Blockchain's complete, immutable chain of custody enables instant identification of the point of entry of a counterfeit product. All affected batches can be traced and recalled, and relevant parties (regulators, hospitals, other pharmacies) alerted --- far faster than manual tracing."}, {"num": 170, "text": "A future trend listed in your lectures is \"Development of\nindustry-specific blockchain frameworks.\" What problem does this solve?", "options": ["A. The lack of blockchain computing power", "B. The current lack of standardisation --- industry-specific frameworks\ncreate common protocols enabling interoperability between different\ncompanies' blockchain systems", "C. The inability of blockchain to process financial transactions", "D. The need to replace AI with blockchain"], "answer": "B", "explanation": "One of blockchain's main challenges is lack of standardisation --- different companies use different blockchain platforms that cannot communicate. Industry-specific frameworks create common standards, enabling interoperability and widespread adoption across a sector."}, {"num": 171, "text": "A retailer uses blockchain to \"improve inventory management and stock\nreplenishment.\" How does blockchain contribute to inventory management\nbeyond what traditional systems offer?", "options": ["A. Blockchain physically moves inventory between locations", "B. Blockchain provides a shared, real-time, tamper-proof record of\ninventory movements across all supply chain partners --- eliminating\ndiscrepancies between partner systems", "C. Blockchain reduces the physical weight of inventory", "D. Blockchain forecasts future inventory needs"], "answer": "B", "explanation": "In traditional multi-party supply chains, inventory records often differ between partners (manufacturer says 500 units shipped; retailer records 490 received). Blockchain's shared ledger eliminates these discrepancies by giving all parties the same verified, real-time inventory record."}, {"num": 172, "text": "A supply chain manager asserts: \"Blockchain eliminates all supply chain\nfraud.\" Which is the most accurate response to this claim?", "options": ["A. Correct --- blockchain makes fraud completely impossible", "B. Partially correct --- blockchain prevents fraudulent modification of\nrecorded transactions but cannot prevent fraud that occurs before data\nis recorded on the blockchain (the \"garbage in, garbage out\" problem)", "C. Incorrect --- blockchain increases fraud risk", "D. Incorrect --- blockchain only prevents financial fraud, not\noperational fraud"], "answer": "B", "explanation": "Blockchain prevents tampering with existing records (immutability) but cannot ensure the original data entered was accurate. If false data is entered at the point of recording (e.g., a corrupt official falsely records a delivery), it is immutably recorded as false data."}, {"num": 173, "text": "A sustainability initiative uses blockchain to track carbon credits\nthroughout a supply chain, recording each emission reduction verified by\nIoT sensors. This is an example of:", "options": ["A. Blockchain in financial supply chains for SME lending", "B. Blockchain for sustainability --- recording and verifying carbon\nfootprint reductions in an immutable, transparent ledger", "C. Cold chain compliance management", "D. Humanitarian aid distribution tracking"], "answer": "B", "explanation": "Using blockchain to record verified carbon emission reductions creates a transparent, tamper-proof ledger of sustainability performance. This enables credible carbon credit trading and prevents double-counting or falsification of environmental claims."}, {"num": 174, "text": "Which of the following best explains why \"transparency\" is a KEY\nblockchain feature for supply chain management?", "options": ["A. It allows companies to see competitors' pricing", "B. Every authorised participant in the network has access to the same\nledger, ensuring all parties have equal visibility of transactions ---\nreducing information asymmetry and building trust", "C. It makes all supply chain data publicly visible on the internet", "D. It only provides transparency to government regulators"], "answer": "B", "explanation": "Blockchain transparency means all authorised network participants see the same ledger simultaneously. This eliminates the information asymmetry that enables fraud, disputes, and inefficiencies --- everyone works from the same verified data."}, {"num": 175, "text": "A supply chain finance application uses blockchain to allow a supplier\nto present a verified invoice (confirmed by the buyer on blockchain) to\na bank for early payment. The bank can immediately verify the invoice's\nlegitimacy without manual checking. This is called:", "options": ["A. Dynamic pricing", "B. Reverse factoring or supply chain financing enabled by\nblockchain-verified invoices", "C. Smart warehouse management", "D. Predictive analytics"], "answer": "B", "explanation": "Blockchain-verified invoices enable supply chain finance: a supplier presents a blockchain-confirmed invoice to a lender who can instantly verify it is genuine and unpaid. This enables faster, lower-risk financing --- particularly beneficial for SME suppliers."}, {"num": 176, "text": "A food company uses blockchain and IoT together in its cold chain. When\na temperature excursion is detected by an IoT sensor, it is\nautomatically recorded on the blockchain as a compliance event. Which\ncombination of blockchain features enables this automated, trustworthy\nrecord?", "options": ["A. Decentralisation and immutability --- automatically recorded events\nthat cannot be deleted or falsified", "B. Smart contracts only --- triggering payment if temperature is\nmaintained", "C. Cryptocurrency payments for compliance verification", "D. AI analytics replacing the need for blockchain recording"], "answer": "A", "explanation": "Decentralisation (no single party controls or can suppress the record) combined with immutability (the temperature excursion event, once recorded, cannot be deleted) creates a trustworthy, automatic compliance record that regulators and partners can rely on."}, {"num": 177, "text": "According to your lectures, increased collaboration between stakeholders\nis listed as a future trend in blockchain. Why is this necessary for\nblockchain adoption in supply chains?", "options": ["A. Blockchain requires all companies to share financial data with\ncompetitors", "B. Blockchain only creates value when multiple supply chain partners\nadopt a common platform --- requiring collaboration to agree on\nstandards, governance, and data sharing protocols", "C. Collaboration reduces blockchain's computational costs", "D. Collaboration is only needed for blockchain in humanitarian supply\nchains"], "answer": "B", "explanation": "Blockchain's value in supply chains is network-dependent --- the more partners on the same platform, the more valuable it becomes. This requires collaboration to agree on technical standards, governance rules, privacy protocols, and data sharing boundaries."}, {"num": 178, "text": "A company's supply chain director says: \"We need blockchain because we\nhave trust issues with our overseas suppliers --- we can't verify what\nthey are actually shipping until goods arrive weeks later.\" Which\nblockchain feature most directly addresses this?", "options": ["A. Smart contracts for automated payment", "B. Real-time, tamper-proof recording of shipment details at origin\ncombined with transparent sharing across all parties --- eliminating\ninformation asymmetry between overseas supplier and buyer", "C. Cryptocurrency payment in advance", "D. AI demand forecasting"], "answer": "B", "explanation": "Blockchain's shared, tamper-proof ledger means suppliers record shipment details (quantity, quality certifications, temperature readings) at the point of dispatch. The buyer sees this immediately, verified and unchangeable --- eliminating the trust gap in overseas supplier relationships."}, {"num": 179, "text": "In your lectures, a key feature of blockchain described as\n\"self-executing contracts with pre-defined conditions that automate\nprocesses\" is:", "options": ["A. Immutability", "B. Decentralisation", "C. Smart contracts", "D. Enhanced security"], "answer": "C", "explanation": "Smart contracts are self-executing contracts embedded in blockchain. When pre-defined conditions are met (e.g., shipment delivered, temperature maintained, payment due date reached), the contract executes automatically without manual intervention --- as defined in your Lecture 7 slides."}, {"num": 180, "text": "A closed-loop supply chain for electronics uses blockchain to ensure\nthat all returned devices are properly documented, their components\ntracked through refurbishment or recycling, and materials verified as\nsustainably reprocessed. This primarily supports:", "options": ["A. Push-based production planning", "B. Circular economy objectives --- blockchain enabling transparent\nend-to-end lifecycle tracking including reverse logistics", "C. Cold chain compliance", "D. Maritime shipping documentation\n\nSECTION: DIGITAL TWINS"], "answer": "B", "explanation": "Blockchain in closed-loop/circular supply chains tracks products from production through return, refurbishment, and recycling --- ensuring that sustainability claims about reuse and responsible disposal are verifiable and transparent. DIGITAL TWINS"}, {"num": 181, "text": "A company creates a virtual replica of its manufacturing plant that\nreceives live sensor data from all machines, simulates different\nproduction scenarios, and alerts managers when a machine is predicted to\nfail. This is best described as:", "options": ["A. A traditional computer simulation", "B. A Digital Twin --- a virtual model that integrates real-time data to\nsimulate, monitor, and predict performance continuously", "C. A smart factory implementation only", "D. An IoT tracking system"], "answer": "B", "explanation": "A Digital Twin is a virtual model that continuously updates with real-time data (unlike a simulation which is static). It monitors current performance, predicts future states, and enables ongoing optimisation --- as defined in your Digital Twins lecture."}, {"num": 182, "text": "Dr. Michael Grieves introduced the concept of Digital Twins in 2002 at a\nmanufacturing engineering conference. What was the original intended\napplication of Digital Twin technology?", "options": ["A. Real-time financial risk management", "B. Space mission management at NASA", "C. Product lifecycle management --- creating virtual models of physical\nproducts to manage them throughout their lifecycle", "D. Cold chain temperature monitoring"], "answer": "C", "explanation": "Dr. Michael Grieves first introduced the Digital Twin concept in 2002 at the Society of Manufacturing Engineering conference, specifically for product lifecycle management --- tracking virtual product models across design, production, and end-of-life stages."}, {"num": 183, "text": "NASA adopted Digital Twin technology for space missions. What was\nNASA's primary use case that made Digital Twins valuable in this\ncontext?", "options": ["A. Forecasting astronaut meal demand", "B. Creating virtual spacecraft models to enable remote diagnostics ---\nunderstanding what is happening to a spacecraft in orbit without\nphysically accessing it", "C. Managing supply chain logistics for rocket parts", "D. Training astronauts in virtual reality environments"], "answer": "B", "explanation": "NASA used Digital Twins to create virtual replicas of spacecraft. When issues arose in orbit, engineers could diagnose and test solutions on the digital twin before implementing them on the real spacecraft --- a critical application where physical access is impossible."}, {"num": 184, "text": "What is the KEY difference between a traditional simulation and a\nDigital Twin?", "options": ["A. Simulations are more accurate than Digital Twins", "B. Digital Twins are cheaper to build than simulations", "C. A simulation uses static, predefined conditions and does not adapt in\nreal time; a Digital Twin continuously updates with live data and\nprovides real-time insights and ongoing optimisation", "D. Simulations use IoT data; Digital Twins do not"], "answer": "C", "explanation": "The core distinction from your lecture slides: Simulation = static conditions, controlled environment, does not adapt. Digital Twin = continuously updated with live data, real-time insights, ongoing optimisation. Digital Twins operate dynamically with real-world input."}, {"num": 185, "text": "DHL implemented Digital Twins for its warehouses and achieved a 30%\nreduction in warehouse processing time. How was this improvement\nachieved?", "options": ["A. By hiring 30% more warehouse staff", "B. By using digital replicas of warehouses to simulate operations,\nidentify bottlenecks in storage and workflow, and optimise inventory\nplacement using AI-driven insights", "C. By reducing the number of products stored", "D. By switching to a centralised single-warehouse model"], "answer": "B", "explanation": "DHL's Digital Twin warehouses use IoT sensor data and AI to create live replicas of warehouse operations. By simulating layouts, workflows, and order flows, bottlenecks are identified and resolved --- achieving the 30% processing time reduction cited in your lecture."}, {"num": 186, "text": "DHL implemented Digital Twins for fleet management, improving delivery\ntimes by 15--20%. Which capabilities enabled this improvement?", "options": ["A. Hiring more drivers", "B. Real-time tracking of delivery vehicles combined with predictive\nmaintenance (preventing breakdowns) and AI-powered route optimisation\nusing live traffic and weather data", "C. Switching to electric vehicles only", "D. Reducing delivery distances by closing distant depots"], "answer": "B", "explanation": "DHL's fleet Digital Twins provide: real-time tracking (visibility of all vehicles), predictive maintenance (AI predicts failures before they happen), and route optimisation (live traffic and weather data). Together, these enable 15--20% delivery time improvements."}, {"num": 187, "text": "A pharmaceutical company creates a Digital Twin of its entire vaccine\nsupply chain --- from manufacturing to hospital delivery. When a port\nstrike is predicted by a news monitoring AI, the Digital Twin\nautomatically tests 3 alternative routing scenarios and recommends the\noptimal one. This demonstrates:", "options": ["A. Traditional ERP-based scenario planning", "B. Digital Twin scenario modelling for proactive supply chain resilience\n--- testing disruption responses before they are needed", "C. Push-based production planning", "D. Blockchain supply chain verification"], "answer": "B", "explanation": "One of the DHL case study capabilities is \"scenario modeling allowing DHL to implement proactive contingency plans.\" Digital Twins enable testing multiple responses to predicted disruptions in the virtual environment before committing to action in the real world."}, {"num": 188, "text": "A digital twin of a cold supply chain continuously monitors storage and\ntransport conditions. If predicted conditions suggest spoilage risk, it\ntriggers an alert and suggests rerouting. Which Digital Twin application\nis this?", "options": ["A. Manufacturing predictive maintenance", "B. Cold supply chain --- real-time monitoring to ensure compliance with\nsafety regulations and reduce spoilage", "C. Maritime vessel routing", "D. Warehouse bottleneck identification"], "answer": "B", "explanation": "Your Digital Twins lecture slides list cold supply chain applications as: real-time monitoring of storage and transport conditions, ensuring compliance with safety regulations, and reducing spoilage to maintain product integrity."}, {"num": 189, "text": "A maritime company creates a Digital Twin of its vessel fleet that\noptimises routes based on real-time weather, sea currents, and port\ncongestion data. It also monitors engine performance to predict\nmaintenance needs. Which sector's Digital Twin application is this?", "options": ["A. Cold supply chain Digital Twin", "B. Healthcare supply chain Digital Twin", "C. Maritime supply chain Digital Twin --- vessel route optimisation and\npredictive maintenance", "D. Manufacturing supply chain Digital Twin"], "answer": "C", "explanation": "Your lecture slides list maritime supply chain Digital Twin applications as: optimising vessel routes based on real-time data, monitoring engine performance and fuel efficiency, and enhancing port logistics and docking operations."}, {"num": 190, "text": "A Digital Twin of a manufacturing supply chain shows real-time\nproduction output, supplier delivery status, and inventory levels\nsimultaneously. When supplier delay is detected, the twin immediately\nmodels the impact on production schedules. This primarily enables:", "options": ["A. Bullwhip effect amplification", "B. Enhanced supply-demand synchronisation --- instantly modelling and\nresponding to disruptions before they impact downstream production", "C. Push-based production optimisation", "D. Centralised inventory management"], "answer": "B", "explanation": "Digital Twins in manufacturing enable supply-demand synchronisation by creating a live model of the entire production and supply system. When disruptions are detected, managers can immediately see their downstream impact and model responses."}, {"num": 191, "text": "A humanitarian aid organisation uses Digital Twins to model disaster\nrelief supply chains before disasters occur. When a typhoon is\npredicted, the Digital Twin tests 5 alternative supply routes and\npre-positions resources. This is an application of:", "options": ["A. Manufacturing predictive maintenance", "B. Humanitarian Digital Twin --- enhancing demand forecasting for\ndisaster relief and optimising resource allocation and delivery planning", "C. Maritime Digital Twin for vessel routing", "D. Cold chain compliance monitoring"], "answer": "B", "explanation": "Humanitarian Digital Twin applications listed in your lecture include: enhancing demand forecasting for disaster relief, optimising resource allocation, and improving efficiency in supply chain coordination during crises. Pre-positioning resources based on Digital Twin scenario modelling is exactly this."}, {"num": 192, "text": "What are the KEY TECHNOLOGIES that underpin Digital Twin technology in\nsupply chains, as listed in your lectures?", "options": ["A. Blockchain, Additive Manufacturing, and ERP", "B. IoT (real-time sensor data), AI & Machine Learning (pattern\nrecognition and prediction), Big Data Analytics, Cloud Computing, and\nSimulation & Modelling", "C. Smart Factories, Smart Warehouses, and Smart Logistics only", "D. GPS tracking and spreadsheet modelling"], "answer": "B", "explanation": "Your Digital Twins lecture lists the key enabling technologies as: IoT (sensor data), AI & Machine Learning (prediction and pattern recognition), Big Data Analytics (processing large datasets), Cloud Computing (accessibility and scalability), and Simulation & Modelling (scenario testing)."}, {"num": 193, "text": "DHL's Digital Twin for supply chain visibility uses AI-driven risk\nassessment to predict disruptions such as port congestion and adverse\nweather. This capability is best described as:", "options": ["A. Traditional supply chain planning", "B. Proactive, AI-powered supply chain risk management using Digital\nTwins --- detecting potential disruptions before they materialise", "C. Reactive crisis management", "D. Cold chain temperature monitoring"], "answer": "B", "explanation": "DHL's Digital Twin provides proactive risk management: AI models continuously analyse signals (port congestion data, weather forecasts, supplier performance) to predict disruptions before they occur --- allowing contingency plans to be activated in advance."}, {"num": 194, "text": "A company uses Digital Twins to help reduce its carbon footprint by\noptimising fleet routes and monitoring fuel consumption in real time.\nDHL achieved sustainability gains through t
