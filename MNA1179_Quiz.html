<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNA1179 – Digital Supply Chain & Innovation | Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --glow: rgba(0,212,255,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,212,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(124,58,237,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container { 
    max-width: 860px; 
    margin: 0 auto; 
    padding: 20px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header .badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text2);
    font-size: 0.9rem;
    font-weight: 300;
  }

  /* SETUP SCREEN */
  #setup-screen {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .config-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .config-card h2 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .config-card h2::before {
    content: attr(data-icon);
    font-size: 1.1rem;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .topic-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text2);
  }
  .topic-chip:hover { border-color: var(--accent); color: var(--text); }
  .topic-chip.selected {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .topic-chip .check {
    width: 18px; height: 18px;
    border: 2px solid currentColor;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    transition: background 0.2s;
  }
  .topic-chip.selected .check { background: var(--accent); border-color: var(--accent); color: #000; }

  .count-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .count-btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .count-btn:hover { border-color: var(--accent); color: var(--text); }
  .count-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text3);
    margin-bottom: 28px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .progress-meta .score-live {
    color: var(--accent);
    font-weight: 600;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--text3);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .q-topic {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent2);
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .q-text {
    font-size: 1rem;
    line-height: 1.65;
    color: var(--text);
    font-weight: 400;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    color: var(--text2);
    line-height: 1.5;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(0,212,255,0.05);
  }
  .option-btn .opt-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 0.8rem;
    min-width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.18s;
  }
  .option-btn:hover:not(:disabled) .opt-letter {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .option-btn.correct {
    border-color: var(--success) !important;
    background: rgba(16,185,129,0.08) !important;
    color: var(--text) !important;
    cursor: default;
  }
  .option-btn.correct .opt-letter {
    background: var(--success) !important;
    border-color: var(--success) !important;
    color: #fff !important;
  }
  .option-btn.wrong {
    border-color: var(--error) !important;
    background: rgba(239,68,68,0.08) !important;
    color: var(--text2) !important;
    cursor: default;
    opacity: 0.7;
  }
  .option-btn.wrong .opt-letter {
    background: var(--error) !important;
    border-color: var(--error) !important;
    color: #fff !important;
  }
  .option-btn.dim {
    opacity: 0.4;
    cursor: default;
  }

  /* EXPLANATION */
  .explanation-box {
    display: none;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 16px 20px;
    margin-top: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .explanation-box.show { display: block; }
  .explanation-box .exp-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .explanation-box .exp-text {
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text2);
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }
  .nav-btn {
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .nav-btn.primary {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  .nav-btn.primary:hover { opacity: 0.85; }
  .nav-btn.primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.ghost {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
  }
  .nav-btn.ghost:hover { color: var(--text); border-color: var(--text3); }

  /* RESULTS SCREEN */
  #results-screen { display: none; }

  .results-hero {
    text-align: center;
    padding: 40px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 24px;
  }
  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 24px;
    position: relative;
  }
  .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-ring .track { fill: none; stroke: var(--surface2); stroke-width: 10; }
  .score-ring .fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-ring .center-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-ring .pct {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .score-ring .label {
    font-size: 0.7rem;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }

  .results-hero h2 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .results-hero p { color: var(--text2); font-size: 0.9rem; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
  }
  .stat-card .val {
    font-size: 1.8rem;
    font-weight: 800;
    font-family: 'IBM Plex Mono', monospace;
  }
  .stat-card .val.green { color: var(--success); }
  .stat-card .val.red { color: var(--error); }
  .stat-card .val.blue { color: var(--accent); }
  .stat-card .lbl { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

  .results-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .results-actions button {
    flex: 1;
    min-width: 140px;
    padding: 14px 20px;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-retake {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-retake:hover { opacity: 0.88; }
  .btn-home {
    background: var(--surface);
    border: 1px solid var(--border) !important;
    border: none;
    color: var(--text2);
  }
  .btn-home:hover { border-color: var(--accent); color: var(--text); }

  /* Review */
  .review-section {
    margin-top: 32px;
  }
  .review-section h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .review-item.wrong-ans { border-color: rgba(239,68,68,0.3); }
  .review-item .ri-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 0.78rem;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }
  .ri-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .ri-badge.correct { background: rgba(16,185,129,0.15); color: var(--success); }
  .ri-badge.wrong { background: rgba(239,68,68,0.15); color: var(--error); }
  .review-item .ri-q { font-size: 0.88rem; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
  .review-item .ri-exp { font-size: 0.82rem; color: var(--text2); line-height: 1.55; border-top: 1px solid var(--border); padding-top: 10px; }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .topic-grid { grid-template-columns: 1fr; }
    .question-card { padding: 20px 16px; }
    .option-btn { font-size: 0.85rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">DCU Business School</div>
    <h1>Digital Supply Chain &amp; Innovation</h1>
    <p>MNA1179 · Dr. V. Dohale · 250-Question Quiz Bank</p>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setup-screen">
    <div class="config-card">
      <h2 data-icon="📚">Select Topics</h2>
      <div class="topic-grid" id="topic-grid"></div>
    </div>

    <div class="config-card">
      <h2 data-icon="🎯">Number of Questions</h2>
      <div class="count-row" id="count-row">
        <button class="count-btn" data-count="10">10</button>
        <button class="count-btn" data-count="20">20</button>
        <button class="count-btn active" data-count="30">30</button>
        <button class="count-btn" data-count="50">50</button>
        <button class="count-btn" data-count="0">All</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn">Start Quiz →</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-meta">
      <span id="q-counter">Question 1 of 30</span>
      <span class="score-live" id="score-live">Score: 0</span>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1</span>
        <span class="q-topic" id="q-topic">SCM Foundations</span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options-list" id="options-list"></div>
      <div class="explanation-box" id="explanation-box">
        <div class="exp-label">💡 Explanation</div>
        <div class="exp-text" id="exp-text"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn ghost" id="quit-btn" onclick="goHome()">← Quit</button>
      <button class="nav-btn primary" id="next-btn" onclick="nextQuestion()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <div class="results-hero">
      <div class="score-ring">
        <svg viewBox="0 0 100 100">
          <circle class="track" cx="50" cy="50" r="42"/>
          <circle class="fill" id="score-arc" cx="50" cy="50" r="42"
            stroke-dasharray="263.9"
            stroke-dashoffset="263.9"/>
        </svg>
        <div class="center-text">
          <div class="pct" id="pct-text">0%</div>
          <div class="label">SCORE</div>
        </div>
      </div>
      <h2 id="result-title">Well done!</h2>
      <p id="result-subtitle"></p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="val green" id="stat-correct">0</div>
        <div class="lbl">Correct</div>
      </div>
      <div class="stat-card">
        <div class="val red" id="stat-wrong">0</div>
        <div class="lbl">Wrong</div>
      </div>
      <div class="stat-card">
        <div class="val blue" id="stat-total">0</div>
        <div class="lbl">Total</div>
      </div>
    </div>

    <div class="results-actions">
      <button class="btn-retake" onclick="retakeQuiz()">🔄 New Quiz (Same Settings)</button>
      <button class="btn-home" onclick="goHome()">⚙️ Change Settings</button>
    </div>

    <div class="review-section" id="review-section"></div>
  </div>
</div>

<script>
const QUIZ_DATA = [{"num": 1, "text": "A company experiences frequent stockouts despite having high overall\ninventory levels across its network. Upon analysis, it is found that\nsmall fluctuations in retail demand are causing large variations in\nupstream production orders. Which supply chain concept best explains\nthis phenomenon?", "options": ["A. Economies of Scale", "B. Just-in-Time (JIT)", "C. Bullwhip Effect", "D. Vertical Integration"], "answer": "C", "explanation": "The Bullwhip Effect (Forrester Effect) describes how small demand fluctuations at the retail level get amplified into large swings in upstream orders and production, exactly as described in the scenario."}, {"num": 2, "text": "A manufacturing firm wants to transition from a digitally enabled supply\nchain to a digitally transformed supply chain. Which of the following\ninitiatives would best support this transition?", "options": ["A. Implementing IoT sensors for real-time tracking of shipments", "B. Using AI-based predictive analytics to dynamically adjust production\nschedules", "C. Predicting the forecast using spreadsheets", "D. Creating an integrated digital twin of the end-to-end supply chain", "E. All of the Above except C"], "answer": "E", "explanation": "Moving from \"digitally enabled\" (efficiency tool) to \"digitally transformed\" (strategic backbone with autonomous/predictive decisions) requires IoT real-time visibility (A), AI-driven autonomous scheduling (B), and end-to-end digital twin integration (D). Simple spreadsheet forecasting (C) belongs to a digitally immature stage."}, {"num": 3, "text": "A retailer calculates that its supply chain generates €600 in customer\nvalue but incurs €520 in total costs. A competitor achieves the same\ncustomer value at €470 in costs. Which statement best describes the\nstrategic implication?", "options": ["A. The retailer should increase its prices to improve surplus", "B. The competitor has a higher supply chain surplus and stronger\ncompetitive position", "C. The retailer has a higher supply chain surplus and stronger\ncompetitive position", "D. Both firms are equally competitive because customer value is the same"], "answer": "B", "explanation": "Supply Chain Surplus = Customer Value − Supply Chain Cost. Retailer: €600−€520 = €80. Competitor: €600−€470 = €130. The competitor generates more surplus, giving it a stronger competitive position."}, {"num": 4, "text": "A fashion retailer produces goods six months in advance based on trend\nforecasts. Midway through the season, an unexpected trend shift causes\nhalf the inventory to become unsellable. Which supply chain approach\ncontributed to this problem?", "options": ["A. Pull-based supply chain", "B. Push-based supply chain", "C. Demand-driven manufacturing", "D. Agile supply chain"], "answer": "B", "explanation": "A push-based supply chain produces to forecast rather than actual demand. If forecasts are wrong --- as with fashion trends --- large quantities of unsellable inventory accumulate. A pull-based system would have produced in response to actual market signals."}, {"num": 5, "text": "A supermarket chain notices that during promotional events, its\ndistribution centres run out of stock while its warehouses hold excess\ninventory. Which supply chain lever would most directly address this\nmismatch?", "options": ["A. Price lever --- reduce promotional discounts", "B. Information lever --- share real-time POS data with distribution\ncentres", "C. Capacity lever --- build more warehouses", "D. Time lever --- extend supplier lead times"], "answer": "B", "explanation": "The Information lever is the most direct fix. Sharing real-time point-of-sale data upstream allows distribution centres and suppliers to anticipate and respond to demand spikes during promotions rather than reacting after stockouts occur."}, {"num": 6, "text": "A company decides to own its raw material suppliers, its manufacturing\nplants, and its retail stores. This strategy is known as:", "options": ["A. Horizontal Integration", "B. Outsourcing", "C. Vertical Integration", "D. Network Design"], "answer": "C", "explanation": "Vertical Integration is when a company owns multiple stages of its own supply chain --- from raw material suppliers through to retail --- as seen with Apple's strategic approach highlighted in the lectures."}, {"num": 7, "text": "Apple sources rare earth elements, uses contract manufacturers like\nFoxconn, and sells through its own stores. Which supply chain success\nfactor does this primarily demonstrate?", "options": ["A. Push-based production strategy", "B. Decentralised warehousing", "C. Vertical integration and strategic supplier relationships", "D. Bullwhip effect mitigation"], "answer": "C", "explanation": "The Apple case study in the lectures highlights vertical integration (ownership across stages), strategic supplier relationships (Foxconn), and real-time tracking technology as its core success factors."}, {"num": 8, "text": "A company's strategy is described as \"choosing what not to do.\" In\nsupply chain terms, a firm decides to prioritise cost leadership and\ndeliberately sacrifices fast delivery. This is an example of:", "options": ["A. Supply chain disruption", "B. Bullwhip effect", "C. Strategic trade-off in supply chain design", "D. Demand amplification"], "answer": "C", "explanation": "Porter's strategy definition --- \"choosing what not to do\" --- means deliberately making trade-offs. Prioritising cost over speed is a classic supply chain design trade-off, as covered in every lecture recap."}, {"num": 9, "text": "Which of the following correctly defines \"Upstream Supply Chain\"?", "options": ["A. Transactions between an organisation and its customers", "B. Transactions between an organisation and its suppliers and\nintermediaries", "C. Movement of finished goods to end consumers", "D. Sell-side e-commerce activities"], "answer": "B", "explanation": "Upstream supply chain refers to transactions between an organisation and its suppliers and intermediaries --- the buy-side of the supply chain. Downstream refers to customer-facing transactions."}, {"num": 10, "text": "A drinks manufacturer uses five supply chain levers to manage\nuncertainty. During a sudden demand surge, which lever involves using\npre-built buffer stock to meet immediate demand?", "options": ["A. Capacity lever", "B. Time lever", "C. Information lever", "D. Inventory lever"], "answer": "D", "explanation": "The Inventory lever is one of the most commonly used levers to deal with uncertainty. Pre-built buffer or safety stock is drawn upon when demand surges unexpectedly."}, {"num": 11, "text": "A grocery retailer feeds real-time point-of-sale data directly to its\nsuppliers so they can trigger replenishment automatically. This is an\napplication of which supply chain lever?", "options": ["A. Inventory lever", "B. Price lever", "C. Information lever", "D. Capacity lever"], "answer": "C", "explanation": "Sharing appropriate information reduces uncertainty throughout the supply chain. Real-time POS data enabling automatic replenishment is a direct application of the Information lever."}, {"num": 12, "text": "Which of the following is NOT a typical stage in a supply chain?", "options": ["A. Manufacturer", "B. Retailer", "C. Financial auditor", "D. Distributor"], "answer": "C", "explanation": "The typical stages of a supply chain are: suppliers, manufacturers, distributors/wholesalers, retailers, and customers. A financial auditor is not a supply chain stage."}, {"num": 13, "text": "A manufacturer receives an order from a retailer, processes it, picks\nand packs the product, and ships it. The customer is waiting two weeks\nfor a product they expected in three days. Which is the most likely root\ncause?", "options": ["A. The supply chain surplus is too high", "B. The order-to-delivery lead time far exceeds the customer's expected\nresponse time", "C. The manufacturer uses a pull-based system", "D. The information lever is being overused"], "answer": "B", "explanation": "When the order-to-delivery lead time exceeds the customer's willingness to wait, service failure occurs. The gap between supply lead time and customer expectations is a fundamental supply chain performance problem."}, {"num": 14, "text": "In a traditional supply chain, a wholesaler receives orders from 10\nretailers, each ordering variable quantities. The wholesaler then orders\nfrom the manufacturer in large batches to get discounts. This behaviour\nprimarily contributes to which phenomenon?", "options": ["A. Vertical integration", "B. Economies of scale", "C. Bullwhip effect", "D. Supply chain resilience"], "answer": "C", "explanation": "Ordering in large batches (order batching) is one of the key causes of the Bullwhip Effect, where demand variability is amplified as you move upstream through the supply chain."}, {"num": 15, "text": "Which definition best describes Supply Chain Management (SCM)?", "options": ["A. The management of a company's financial flows only", "B. The coordination of all supply activities of an organisation from its\nsuppliers and partners to its customers", "C. The process of managing only downstream customer transactions", "D. The use of technology to automate warehousing operations"], "answer": "B", "explanation": "SCM is the coordination of all supply activities of an organisation --- from suppliers and partners to customers --- covering both upstream and downstream flows of products, information, and funds."}, {"num": 16, "text": "A manufacturer uses demand data from its retail partners to trigger\nproduction only when actual customer purchases occur. This is an example\nof:", "options": ["A. Push-based supply chain", "B. Pull-based supply chain", "C. Centralised warehousing", "D. Vertical integration"], "answer": "B", "explanation": "A pull-based supply chain is triggered by actual customer demand rather than forecasts. Production begins when real purchase signals are received from downstream, reducing overproduction and waste."}, {"num": 17, "text": "Which of the following best illustrates the concept that \"the customer\nis the only source of revenue\" in supply chain management?", "options": ["A. A supplier increases raw material prices, raising total supply chain\ncost", "B. A manufacturer optimises its production line, reducing internal costs", "C. End consumers purchase products, generating revenue that flows back\nthrough the entire supply chain", "D. A logistics provider reduces delivery costs"], "answer": "C", "explanation": "All revenue in a supply chain originates from end-customer purchases. Every other activity in the supply chain is a cost. This is why supply chain surplus focuses on maximising value delivered to the customer."}, {"num": 18, "text": "A pharmaceutical company sources ingredients from a single supplier in\none country. A natural disaster disrupts that country's exports. The\ncompany cannot fulfil hospital orders for three months. This situation\nprimarily demonstrates a failure of:", "options": ["A. Demand forecasting", "B. Push-based production", "C. Supply chain resilience and risk management", "D. Inventory lever misuse"], "answer": "C", "explanation": "Single-sourcing from one geographic region creates a fragile supply chain. The inability to recover from a natural disaster illustrates a lack of supply chain resilience --- the ability to absorb and recover from disruptions."}, {"num": 19, "text": "A retailer uses a price lever strategy during off-peak periods by\noffering discounts to shift demand away from peak periods. What is the\nprimary intended supply chain benefit?", "options": ["A. Increase the bullwhip effect", "B. Smooth demand variability and reduce capacity strain", "C. Increase inventory holding costs", "D. Shift to a push-based model"], "answer": "B", "explanation": "The Price lever can be used to shift demand across time periods, smoothing out variability and reducing the need for surge capacity. This makes production and logistics planning more predictable and efficient."}, {"num": 20, "text": "A logistics manager says their company has moved from \"buy-side\" to\n\"sell-side\" e-commerce integration. What has changed?", "options": ["A. The company has moved from downstream to upstream supply chain focus", "B. The company has moved from upstream supplier management to downstream\ncustomer management", "C. The company has adopted blockchain technology", "D. The company has implemented a push-based system"], "answer": "B", "explanation": "Buy-side e-commerce = upstream supply chain (transactions with suppliers). Sell-side e-commerce = downstream supply chain (transactions with customers). The shift represents a change in focus from procurement to customer fulfilment."}, {"num": 21, "text": "A distributor acts as an intermediary between a manufacturer and\nmultiple retailers. What is the distributor's primary role in the\nsupply chain?", "options": ["A. To manufacture goods on behalf of retailers", "B. To aggregate products and manage storage and transportation between\nmanufacturer and retailers", "C. To set the retail price of goods", "D. To forecast end-consumer demand"], "answer": "B", "explanation": "Distributors and wholesalers act as intermediaries --- aggregating products, managing warehousing, and organising transportation between manufacturers and retailers, enabling efficient large-batch logistics."}, {"num": 22, "text": "A company's supply chain objective is stated as: \"Maximise net value\ngenerated.\" A new CEO wants to achieve this by reducing supply chain\ncosts without changing the customer-perceived value. Which lever is she\ndirectly targeting?", "options": ["A. Price lever", "B. Inventory lever", "C. Capacity lever", "D. All cost-side levers simultaneously"], "answer": "D", "explanation": "Supply chain surplus = Customer Value − Supply Chain Cost. To grow surplus without changing value, the CEO must reduce costs, which spans all levers --- inventory reduction, capacity optimisation, time compression, and better information use."}, {"num": 23, "text": "A consumer electronics company notices that demand for its smartphones\nis perfectly predictable at 10,000 units per month, but it still carries\n45 days of safety stock. Which supply chain principle is being violated?", "options": ["A. The need for strategic sourcing", "B. The principle that safety stock compensates for uncertainty --- when\ndemand is certain, safety stock is unnecessary", "C. The bullwhip effect principle", "D. The vertical integration principle"], "answer": "B", "explanation": "Safety stock exists to buffer against demand uncertainty. If demand is perfectly predictable (10,000 units/month, no variance), holding safety stock is wasteful --- it represents unnecessary capital tied up in inventory."}, {"num": 24, "text": "Which of the following is the correct formula for Supply Chain Surplus?", "options": ["A. Supply Chain Surplus = Revenue − Operating Profit", "B. Supply Chain Surplus = Inventory Value − Supply Chain Cost", "C. Supply Chain Surplus = Customer Value − Supply Chain Cost", "D. Supply Chain Surplus = Total Assets − Total Liabilities"], "answer": "C", "explanation": "Supply Chain Surplus = Customer Value − Supply Chain Cost, as directly stated in your lectures. Growing this surplus is the objective of effective supply chain management."}, {"num": 25, "text": "A fashion retailer's supply chain has the following stages in order.\nWhich sequence is correct?", "options": ["A. Retailer → Distributor → Manufacturer → Supplier → Customer", "B. Supplier → Manufacturer → Distributor → Retailer → Customer", "C. Customer → Retailer → Manufacturer → Supplier", "D. Manufacturer → Supplier → Retailer → Customer"], "answer": "B", "explanation": "The standard supply chain flow is: Supplier → Manufacturer → Distributor/Wholesaler → Retailer → Customer. Information and funds flow in both directions, but physical goods flow from suppliers to customers."}, {"num": 26, "text": "A company's warehouse manager notices that ordering in large batches\nreduces per-unit ordering costs but dramatically increases average\ninventory levels. This is a trade-off between:", "options": ["A. Lead time and service level", "B. Ordering/set-up costs and inventory holding costs (the classic EOQ\ntrade-off)", "C. Push and pull strategies", "D. Upstream and downstream integration"], "answer": "B", "explanation": "This is the classic Economic Order Quantity (EOQ) trade-off: as batch size increases, ordering costs fall but inventory holding costs rise. The optimal balance point is the EOQ."}, {"num": 27, "text": "Which of the following scenarios best demonstrates the use of the Time\nlever in supply chain management?", "options": ["A. Offering 10% discounts during slow sales periods", "B. Building a new warehouse near a customer cluster to reduce delivery\ntime", "C. Sharing forecasting data with suppliers", "D. Holding safety stock to buffer demand uncertainty"], "answer": "B", "explanation": "The Time lever involves the combination of speedy supply and customers' willingness to wait. Positioning a warehouse closer to customers directly reduces order-to-delivery time, applying the time lever strategically."}, {"num": 28, "text": "A food manufacturer's product moves through 6 supply chain stages\nbefore reaching the consumer. At each stage, small demand forecast\nerrors are made independently. By the time the signal reaches the raw\ningredient supplier, the order is three times larger than actual\nconsumer demand. This is:", "options": ["A. Economies of scale in action", "B. Just-in-Time manufacturing", "C. The Bullwhip Effect caused by independent forecasting at each stage", "D. Efficient supply chain design"], "answer": "C", "explanation": "Independent forecasting at each stage, combined with safety stock buffers, amplifies demand distortions upstream. This is the classic Bullwhip/Forrester Effect --- the more stages, the greater the amplification."}, {"num": 29, "text": "A retailer gathers customer feedback at the point of sale and regularly\nshares it with manufacturers to adjust product design. This activity\nprimarily serves which supply chain function?", "options": ["A. Upstream information flow --- informing upstream production decisions\nbased on downstream demand intelligence", "B. Downstream logistics management", "C. Safety stock calculation", "D. Vertical integration strategy"], "answer": "A", "explanation": "Information flows in both directions in a supply chain. Customer feedback flowing from retailer to manufacturer is upstream information flow --- helping manufacturers adjust products and production to real market needs."}, {"num": 30, "text": "A hospital supply chain manager must choose between a centralised\nmedical supply warehouse serving all 12 hospitals in the region versus a\nlocal store at each hospital. Which of the following correctly states\nthe key trade-off?", "options": ["A. Centralised: better service levels; Decentralised: lower overall\ninventory", "B. Centralised: lower total inventory and cost; Decentralised: faster\nresponse and better service to each hospital", "C. Centralised: higher transport costs; Decentralised: higher inventory\ncosts --- so both options are equal", "D. Centralised: more resilient; Decentralised: more vulnerable to\ndisruption"], "answer": "B", "explanation": "Centralised warehousing achieves economies of scale and lower total inventory through demand pooling, but suffers from longer delivery times. Decentralised storage reduces lead times and improves service at the cost of higher inventory duplication."}, {"num": 31, "text": "Which of the following best describes why supply chains are increasingly\nreferred to as \"supply networks\" or \"supply webs\"?", "options": ["A. Because supply chains now use internet technologies", "B. Because the structure is complex with multiple interconnected nodes\nand flows in all directions, not a simple linear chain", "C. Because blockchain creates a web of transactions", "D. Because all supply chain management is done via web portals"], "answer": "B", "explanation": "Modern supply chains are rarely linear. They involve multiple suppliers, multiple manufacturing sites, cross-docking hubs, and distribution centres --- creating a network or web structure rather than a simple chain."}, {"num": 32, "text": "A company introduces a Just-in-Time delivery system requiring suppliers\nto deliver components daily rather than weekly. Which of the following\nrisks does this create for the supplier?", "options": ["A. Reduced transportation costs", "B. Increased demand uncertainty and transportation frequency, raising\nthe supplier's logistics costs", "C. Lower inventory holding costs for the supplier", "D. Improved demand visibility for the supplier"], "answer": "B", "explanation": "JIT shifts the burden of holding inventory from the customer to the supplier. More frequent, smaller deliveries increase the supplier's transport costs and operational complexity, even though the customer benefits from reduced inventory."}, {"num": 33, "text": "An FMCG company shares real-time sales data with its top 10 suppliers\nthrough a digital platform. As a result, supplier orders become much\nsmoother with far fewer large spikes. Which supply chain problem has\nbeen directly addressed?", "options": ["A. Vertical integration", "B. The Bullwhip Effect --- through improved information sharing", "C. Supply chain surplus reduction", "D. Centralised warehousing inefficiency"], "answer": "B", "explanation": "One of the main causes and remedies of the Bullwhip Effect involves information sharing. When suppliers can see real end-customer demand data (rather than just orders from the next tier), demand amplification is dramatically reduced."}, {"num": 34, "text": "A startup creates a direct-to-consumer model, eliminating distributors\nand wholesalers. What is the primary supply chain benefit of this\napproach?", "options": ["A. Greater economies of scale in production", "B. Reduced supply chain surplus", "C. Shorter supply chain, faster delivery, and direct access to customer\ndemand data", "D. Increased inventory levels due to managing consumer orders directly"], "answer": "C", "explanation": "Eliminating intermediaries shortens the supply chain, reduces lead times, provides direct customer demand visibility, and can reduce costs by removing middlemen. This is the model used by many D2C e-commerce companies."}, {"num": 35, "text": "A manufacturer produces 20% more goods than customer orders during every\nproduction run \"just to be safe.\" Over time, this creates chronic\noverstock and waste. This behaviour primarily reflects:", "options": ["A. A demand-driven, pull-based system", "B. Effective use of the inventory lever", "C. Supply chain inefficiency driven by demand uncertainty without proper\ninformation systems", "D. Best practice in supply chain management"], "answer": "C", "explanation": "Producing excess \"just to be safe\" without real demand data signals is a form of supply chain waste. It reflects a lack of demand visibility, leading to chronic overstock, tying up capital, and reducing the supply chain surplus."}, {"num": 36, "text": "A consultancy benchmarks two companies in the same sector. Company A has\nSupply Chain Surplus of €150 per unit. Company B has €90 per unit. Both\nsell at the same price. What does this most likely indicate about\nCompany A?", "options": ["A. Company A has lower customer value delivery", "B. Company A has higher supply chain costs", "C. Company A manages its supply chain more efficiently, with lower costs\nrelative to value delivered", "D. Company A uses a push-based supply chain"], "answer": "C", "explanation": "Higher supply chain surplus (same customer value, same price) means lower supply chain costs. Company A either operates more efficiently, has better supplier terms, or lower logistics costs --- all pointing to superior supply chain management."}, {"num": 37, "text": "During a lecture recap, your professor repeatedly states: \"Strategy is\nmaking trade-offs in competing. The essence of strategy is choosing what\nnot to do.\" Which of the following supply chain scenarios best embodies\nthis principle?", "options": ["A. A logistics firm that tries to be the fastest, cheapest, and most\nflexible simultaneously", "B. An e-commerce company that deliberately chooses standard 5-day\ndelivery to reduce cost, accepting it will lose speed-sensitive\ncustomers", "C. A company that automates all supply chain decisions", "D. A retailer that increases its product range to serve all market\nsegments"], "answer": "B", "explanation": "Porter's strategy definition requires deliberate sacrifice. Choosing 5-day delivery over same-day delivery to achieve cost leadership is a conscious trade-off --- serving one segment well by accepting it won't win another. This is genuine strategic choice."}, {"num": 38, "text": "A cold-chain logistics provider monitors temperature throughout the\nsupply chain. If temperature exceeds the safe threshold, an alert is\nautomatically sent to the nearest depot to reroute the shipment. Which\nsupply chain lever is most prominently in use?", "options": ["A. Capacity lever", "B. Inventory lever", "C. Information lever combined with Time lever", "D. Price lever"], "answer": "C", "explanation": "Real-time temperature monitoring and automatic rerouting use the Information lever (sensor data triggering decisions) and the Time lever (responding quickly to prevent spoilage). Both levers work together to protect product integrity."}, {"num": 39, "text": "A manufacturing company sources 60% of its components from a single\nlow-cost country supplier to maximise economies of scale. A port strike\nin that country halts shipments for six weeks. Which supply chain design\nflaw is revealed?", "options": ["A. Over-reliance on the inventory lever", "B. Excessive supply chain surplus", "C. Geographic concentration risk --- lack of supply chain resilience\nthrough supplier diversification", "D. Misapplication of the pull strategy"], "answer": "C", "explanation": "Concentrating sourcing in one geography to maximise cost savings creates geographic concentration risk. A single-point disruption (strike, natural disaster, political event) can halt the entire supply chain. Resilience requires diversification."}, {"num": 40, "text": "The term \"supply chain\" may be better described as a \"supply\nnetwork\" because:", "options": ["A. Supply chains are always digital", "B. Multiple flows of products, information, and funds exist\nsimultaneously between multiple parties in complex, non-linear\nrelationships", "C. Supply chain software is built on network protocols", "D. Supply chains only operate within national borders\n\nSECTION: NETWORK DESIGN"], "answer": "B", "explanation": "Modern supply chains involve simultaneous flows of products, information, and funds across multiple interconnected parties --- manufacturers, suppliers, logistics providers, retailers, and customers --- forming a network rather than a simple chain. NETWORK DESIGN"}, {"num": 41, "text": "A global e-retailer is redesigning its distribution network after rapid\nexpansion. The project team asks: how many fulfilment centres should we\nhave, where should they be located, and which products should each hold?\nThese are examples of:", "options": ["A. Operational supply chain decisions", "B. Network design decisions", "C. Inventory management decisions", "D. Demand forecasting decisions"], "answer": "B", "explanation": "Network design decisions cover: number of facilities, their locations, capacity at each, which products to hold, and which markets to serve. These are strategic, long-term decisions that shape the entire supply chain structure."}, {"num": 42, "text": "A pharmaceutical company is deciding where to locate its new European\ndistribution centre. It considers proximity to motorways, airport\naccess, and rail connections. Which factor is driving this analysis?", "options": ["A. Macroeconomic factors", "B. Political factors", "C. Infrastructure factors", "D. Customer response time factors"], "answer": "C", "explanation": "Infrastructure factors in network design include transportation networks (motorways, airports, rail). Proximity to these reduces logistics costs and improves delivery speed, making infrastructure a key location driver."}, {"num": 43, "text": "A European car manufacturer is considering opening a factory in a\ncountry offering 10-year tax holidays and subsidised land for foreign\ninvestors. Which network design factor is most relevant here?", "options": ["A. Infrastructure factors", "B. Competitive factors", "C. Macroeconomic factors --- specifically tariffs and tax incentives", "D. Customer response time requirements"], "answer": "C", "explanation": "Tax holidays, subsidised land, and government investment incentives are macroeconomic factors --- specifically tax incentives --- that influence where companies choose to locate supply chain facilities."}, {"num": 44, "text": "Two competing coffee shop chains both choose to open in the same\nhigh-footfall street despite available locations elsewhere. In supply\nchain network design terms, this demonstrates:", "options": ["A. Centralised warehousing strategy", "B. Positive externalities --- locating near a competitor to benefit from\nshared customer traffic", "C. Vertical integration", "D. Supply chain surplus maximisation"], "answer": "B", "explanation": "Positive externalities in network design refer to benefits from locating near competitors or complementary businesses. Clustering in high-footfall areas attracts more customers than isolated locations, even when competing directly."}, {"num": 45, "text": "Amazon operates a small number of very large fulfilment centres serving\nentire countries, rather than many small local warehouses. This is an\nexample of:", "options": ["A. Decentralised warehousing strategy", "B. Push-based supply chain design", "C. Centralised warehousing --- achieving economies of scale and\nsimplified inventory management", "D. Digital twin implementation"], "answer": "C", "explanation": "Amazon's fulfilment centre model is the textbook example of centralised warehousing: large facilities serving wide regions achieve economies of scale in operations and inventory management, as highlighted in the Lecture 3 slides."}, {"num": 46, "text": "A grocery retailer operates local distribution hubs in every major city\nto ensure next-day delivery to stores. This is an example of:", "options": ["A. Centralised warehousing", "B. Decentralised warehousing --- multiple regional facilities for\nfaster, localised delivery", "C. Vertical integration", "D. Digital twin deployment"], "answer": "B", "explanation": "Local distribution hubs in multiple cities = decentralised warehousing. This enables faster delivery to regional stores and better responsiveness to local demand fluctuations, as highlighted in the Lecture 3 slides with grocery retailers."}, {"num": 47, "text": "A manufacturer with centralised production in Germany wants to reduce\ndelivery time to its Australian customers from 6 weeks to 1 week. Which\nnetwork design change would most directly achieve this?", "options": ["A. Switching from a push to a pull supply chain", "B. Establishing a regional distribution centre in Australia", "C. Implementing blockchain technology", "D. Sharing POS data with the Australian retail partners"], "answer": "B", "explanation": "Establishing a distribution centre closer to the market reduces order-to-delivery lead time by positioning inventory geographically near customers. This is a direct network design solution to lead-time problems."}, {"num": 48, "text": "A company faces a trade-off: centralising all production in one\nmega-factory (to reduce unit costs) versus having smaller regional\nfactories (to reduce delivery times). The framework used to resolve this\nshould aim to:", "options": ["A. Minimise only production costs", "B. Maximise overall supply chain profitability while providing customers\nwith the appropriate level of responsiveness", "C. Minimise the number of supply chain stages", "D. Maximise inventory holding at each facility"], "answer": "B", "explanation": "The network design framework objective is to maximise overall supply chain profitability while providing customers with appropriate responsiveness. This requires balancing cost efficiency against service level --- not optimising either in isolation."}, {"num": 49, "text": "After a major merger, a newly combined company has 12 overlapping\nwarehouses in the same regions. They want to rationalise. This is a\ntrigger for which type of decision?", "options": ["A. Demand planning decision", "B. Revisiting network design decisions after significant structural\nchanges such as mergers", "C. Inventory safety stock recalculation", "D. Pull strategy implementation"], "answer": "B", "explanation": "Network design decisions should be revisited after major changes: mergers, acquisitions, market shifts, or significant changes in factor costs. Post-merger network rationalisation is a direct application of this principle."}, {"num": 50, "text": "A company wants to locate a new warehouse. It builds a model to test\nmultiple locations and calculate total logistics costs (transport +\nholding + facility) for each scenario. This is called:", "options": ["A. A push-pull analysis", "B. A network design optimisation model", "C. A supply chain surplus calculation", "D. A bullwhip analysis"], "answer": "B", "explanation": "Network design optimisation models are used to evaluate potential facility locations, allocate demand to facilities, and identify the configuration that minimises total supply chain cost while meeting service requirements."}, {"num": 51, "text": "A medical device company considers locating a factory in a country whose\ngovernment has just imposed import tariffs on medical devices from other\nregions. How does this affect the network design decision?", "options": ["A. Tariffs reduce the attractiveness of local production", "B. Tariffs make local production inside the tariff barrier more\nattractive to avoid import costs", "C. Tariffs have no effect on network design", "D. Tariffs only affect logistics providers"], "answer": "B", "explanation": "Tariffs on imports make domestic production more competitive inside that market. Companies often locate manufacturing within high-tariff regions to avoid the tariff penalty --- a classic macroeconomic factor in network design."}, {"num": 52, "text": "A sports equipment retailer has stores in 200 cities but only 3\ndistribution centres. Customers in remote cities often wait 7--10 days\nfor online orders. To improve this, the retailer adds 5 regional hubs.\nWhich network design factor is being directly addressed?", "options": ["A. Tax incentives", "B. Positive externalities", "C. Customer response time and service level requirements", "D. Political factors"], "answer": "C", "explanation": "Customer response time and service level is a key network design factor. Adding regional hubs directly reduces order-to-delivery time for remote customers, improving the service level across the network."}, {"num": 53, "text": "Which of the following is a DISADVANTAGE of centralised warehousing?", "options": ["A. Simpler inventory management", "B. Lower storage and overhead costs", "C. Increased transportation costs and longer lead times for distant\nlocations", "D. Economies of scale in operations"], "answer": "C", "explanation": "A key disadvantage of centralised warehousing is that goods must travel further to reach distant customers or stores, increasing transportation costs and lead times. The further the customer from the central facility, the worse the service."}, {"num": 54, "text": "A company opens 8 regional warehouses instead of 1 central facility.\nInventory for the same product is now held in 8 locations rather than 1.\nWhat is the likely impact on total inventory holding costs?", "options": ["A. Inventory holding costs will fall due to shorter transportation", "B. Inventory holding costs will increase due to duplication of stock\nacross locations", "C. Inventory holding costs remain the same", "D. Inventory holding costs fall because demand is pooled"], "answer": "B", "explanation": "Decentralised warehousing leads to inventory duplication --- each location must hold safety stock independently, since they cannot pool uncertainty. Total system inventory rises compared to a single centralised location."}, {"num": 55, "text": "A network design model identifies three potential factory locations.\nSite A has lowest land cost but poor road access. Site B has excellent\nmotorway access but high land cost. Site C is near a university research\npark. Which factor does Site C's proximity to a university represent?", "options": ["A. Infrastructure factor", "B. Macroeconomic factor", "C. Positive externality --- access to skilled talent and innovation", "D. Political factor"], "answer": "C", "explanation": "Locating near a university or research park represents a positive externality: access to skilled graduates, research collaboration, and innovation. This is a competitive factor that enhances long-term capability beyond simple cost reduction."}, {"num": 56, "text": "A European FMCG company recently expanded into 5 new Asian markets,\nfaces currency volatility, and has a competitor threatening to undercut\non price in its home market. According to your lectures, when should the\ncompany revisit its network design?", "options": ["A. Only when a new CEO joins", "B. Only when a factory breaks down", "C. After significant market changes, mergers, or factor cost changes ---\nall of which apply here", "D. Network design should never change once established"], "answer": "C", "explanation": "The lectures explicitly state that network design decisions should be revisited after market changes, mergers, and factor cost changes. Currency volatility, new market entry, and competitive pricing pressure all qualify as triggers for network design review."}, {"num": 57, "text": "A company has a warehouse that serves both a high-density urban market\n(requires daily delivery) and a sparse rural market (weekly delivery\nacceptable). Network design theory suggests:", "options": ["A. Both markets should be served from the same facility regardless of\nservice differences", "B. The network should be designed to match service level requirements to\neach market segment, possibly with different facility configurations", "C. The rural market should be abandoned", "D. Centralised warehousing always satisfies all market types equally"], "answer": "B", "explanation": "Different customer segments have different response time requirements. Network design must balance service levels across segments --- potentially using urban micro-fulfilment for city customers and centralised facilities for rural areas."}, {"num": 58, "text": "A fast-fashion brand uses a network design where designers,\nmanufacturers, and distributors are all located within 200 km of each\nother in Spain. This geographic concentration primarily enables:", "options": ["A. Lower customer value delivery", "B. Extremely fast design-to-shelf cycle times --- a key competitive\nadvantage", "C. High transportation costs", "D. Economies of scale through global sourcing"], "answer": "B", "explanation": "Geographic clustering of design, production, and distribution (similar to Zara's model) dramatically compresses the supply chain lead time, enabling fast fashion response to trends. Speed-to-market is the competitive advantage gained."}, {"num": 59, "text": "A company uses a network design model to evaluate which of its 15\nfactories should supply which of 30 regional markets, minimising total\ntransport and production costs. This is an example of:", "options": ["A. Demand forecasting", "B. Inventory optimisation", "C. Facility location and demand allocation --- core network design\noptimisation", "D. Bullwhip mitigation"], "answer": "C", "explanation": "Allocating which markets each facility serves, while minimising total cost, is a core network design optimisation problem. It involves matching supply capacity to demand geographically and economically."}, {"num": 60, "text": "Which of the following is a key ADVANTAGE of decentralised warehousing\nover centralised warehousing?", "options": ["A. Lower total inventory in the network", "B. Economies of scale in storage operations", "C. Faster delivery times and improved customer service for regional\nmarkets", "D. Simplified inventory management"], "answer": "C", "explanation": "Decentralised warehousing places inventory closer to customers, directly reducing delivery lead times and improving service levels for regional markets --- its key advantage over centralised models."}, {"num": 61, "text": "A European automaker is considering a factory in Eastern Europe versus\nSoutheast Asia. Eastern Europe offers EU single-market access; Southeast\nAsia offers lower labour costs. The final decision is likely driven by:", "options": ["A. Only labour costs", "B. A multi-factor analysis including infrastructure, political\nstability, tariffs, market access, and total logistics costs", "C. Only transportation costs", "D. Only the number of local suppliers"], "answer": "B", "explanation": "Network design decisions involve multiple factors simultaneously: labour costs, infrastructure, political stability, tariffs, currency risk, and market access all need to be weighted. No single factor determines the optimal location."}, {"num": 62, "text": "A technology company's sales in North America double unexpectedly due\nto a viral product. Their single European DC cannot keep up. Which\naction reflects best practice in network design?", "options": ["A. Simply hiring more staff at the European DC", "B. Establishing a North American distribution centre to serve that\nmarket directly --- revisiting network design due to market changes", "C. Reducing product SKUs", "D. Switching to a push-based supply chain"], "answer": "B", "explanation": "Unexpected market growth is a key trigger to revisit network design. Establishing a regional DC in the high-demand market reduces lead times and logistics costs --- exactly the kind of network adaptation called for in your lectures."}, {"num": 63, "text": "A company's network design model shows that adding a 4th distribution\ncentre reduces customer lead time by 40% but increases total supply\nchain costs by 25%. The decision to add the facility should be based on:", "options": ["A. Only the cost increase", "B. Only the service improvement", "C. Whether the increase in customer value (from faster delivery)\njustifies the additional supply chain cost --- the surplus equation", "D. Always adding the facility to maximise service"], "answer": "C", "explanation": "The decision should use the supply chain surplus framework: does the additional customer value generated by 40% faster delivery outweigh the 25% cost increase? If customers will pay more or switch from competitors, the surplus grows."}, {"num": 64, "text": "A retailer's distribution centres are all located in the south of the\ncountry, but 60% of its customers are in the north. Delivery to northern\ncustomers takes 5 days versus 1 day for southern customers. Which factor\nwas NOT properly considered in the original network design?", "options": ["A. Infrastructure factors", "B. Macroeconomic factors", "C. Customer response time and geographic demand distribution", "D. Positive externalities"], "answer": "C", "explanation": "Geographic demand distribution and customer response time requirements were not properly considered. Network design should match facility locations to where demand is concentrated to minimise delivery distances and lead times."}, {"num": 65, "text": "A cross-docking facility receives incoming truckloads from suppliers,\nimmediately sorts and consolidates them by destination, and dispatches\nthem to stores without warehousing inventory. What is the primary supply\nchain benefit?", "options": ["A. Increased safety stock at each store", "B. Elimination of intermediate storage --- reduced lead time and lower\ninventory holding costs", "C. Economies of scale in production", "D. Centralised inventory management\n\nSECTION: DIGITAL SUPPLY CHAIN"], "answer": "B", "explanation": "Cross-docking eliminates intermediate storage. Goods are transferred directly from inbound to outbound transport, reducing lead time and inventory holding costs --- enabling near-JIT replenishment to stores. DIGITAL SUPPLY CHAIN"}, {"num": 66, "text": "A company's supply chain uses Excel for planning, reacts to disruptions\nafter they occur, and has fragmented data across departments. According\nto the Digital Supply Chain maturity model, where is this company?", "options": ["A. Digitally Transformed", "B. Digitally Enabled", "C. Digitally Immature", "D. Industry 4.0 compliant"], "answer": "C", "explanation": "Digitally Immature supply chains are characterised by minimal technology support, reactive decision-making, fragmented data, and traditional processes --- all of which match this scenario."}, {"num": 67, "text": "A manufacturing company has integrated ERP systems, uses data to assist\ndecisions, has digitised its core processes, and sees moderate\ncompetitive impact from technology. Where is it on the Digital Supply\nChain maturity model?", "options": ["A. Digitally Immature", "B. Digitally Enabled", "C. Digitally Transformed", "D. Industry 4.0 pioneer"], "answer": "B", "explanation": "Digitally Enabled supply chains use technology as an efficiency tool, support data-assisted decisions, have integrated and digitised processes, and achieve moderate competitive impact --- exactly matching this description."}, {"num": 68, "text": "A logistics company uses autonomous AI to dynamically reroute shipments\nin real time, predicts disruptions before they occur, and has reimagined\nits processes around digital capabilities. This company is best\ndescribed as:", "options": ["A. Digitally Immature", "B. Digitally Enabled", "C. Digitally Transformed", "D. Just-in-Time compliant"], "answer": "C", "explanation": "Digitally Transformed supply chains use technology as a strategic backbone, make predictive and autonomous decisions, have reimagined (not just digitised) processes, and achieve high competitive impact."}, {"num": 69, "text": "The COVID-19 pandemic accelerated the adoption of digital supply chain\ntechnologies. Which shift did it specifically trigger in inventory\nstrategy?", "options": ["A. From Just-in-Case (JIC) to Just-in-Time (JIT)", "B. From Just-in-Time (JIT) to Just-in-Case (JIC)", "C. From push to pull strategy", "D. From centralised to decentralised network design"], "answer": "B", "explanation": "COVID-19 exposed the fragility of lean JIT supply chains. Companies shifted toward Just-in-Case (JIC) strategies --- holding buffer stocks of critical items --- to build resilience against future disruptions."}, {"num": 70, "text": "A digital supply chain is described as a \"cyber-physical system.\" What\ndoes this mean in the context of supply chain operations?", "options": ["A. Supply chains that only exist online with no physical goods", "B. Systems that integrate digital technologies (IoT, AI, cloud) with\nphysical supply chain operations to enable real-time monitoring and\noptimisation", "C. Supply chains that use robots exclusively", "D. A type of blockchain network"], "answer": "B", "explanation": "A cyber-physical system bridges the digital and physical worlds. In supply chains, this means using digital tools (IoT sensors, AI, cloud platforms) to monitor, analyse, and optimise real physical operations in real time."}, {"num": 71, "text": "A smart factory uses Cyber-Physical Systems (CPS) that integrate AI,\nIoT, and real-time data analytics to monitor production lines and\npredict machine failures before they occur. This type of facility is\nassociated with which industrial concept?", "options": ["A. Just-in-Time manufacturing", "B. Industry 4.0 (the Fourth Industrial Revolution)", "C. Centralised warehousing", "D. Vertical integration"], "answer": "B", "explanation": "Smart factories are the physical manifestation of Industry 4.0. They use CPS to integrate AI, IoT, and real-time analytics for predictive maintenance, adaptive manufacturing, and connected production --- core features of the Fourth Industrial Revolution."}, {"num": 72, "text": "A retailer installs robotics and AI-driven conveyor systems in its\nwarehouse to automate the picking, packing, and dispatching of orders.\nThis is best described as:", "options": ["A. Smart logistics", "B. Smart warehouse implementation", "C. Blockchain for traceability", "D. Digital twin deployment"], "answer": "B", "explanation": "Smart warehouses use AI, automation, and robotics for inventory management, picking, packing, and dispatch. They support omnichannel fulfilment and reduce costs while improving speed and accuracy --- as defined in Lecture 5."}, {"num": 73, "text": "A logistics company uses AI-powered route planning, IoT for real-time\nshipment tracking, and blockchain for automated contract execution. This\nis an example of:", "options": ["A. Smart factory operations", "B. Smart logistics", "C. Cloud computing implementation", "D. Additive manufacturing supply chain"], "answer": "B", "explanation": "Smart logistics combines AI route planning, IoT tracking, and blockchain contracts to enhance efficiency, reduce waste, and build sustainable supply chains --- the definition provided in your Lecture 5 slides."}, {"num": 74, "text": "A pharmaceutical company uses IoT sensors attached to vaccine shipments\nthat continuously transmit temperature and humidity data to a central\nplatform. If a breach occurs, the system automatically alerts the\nlogistics team to reroute. Which key technology is primarily in use?", "options": ["A. Blockchain", "B. Additive Manufacturing", "C. Internet of Things (IoT) with automated alerting", "D. Digital Twin"], "answer": "C", "explanation": "IoT sensors track goods in real time --- temperature, humidity, location. In this scenario, IoT is the primary technology enabling condition monitoring and automated alerts for cold chain compliance."}, {"num": 75, "text": "A company migrates all its supply chain data and planning tools to a\ncloud platform accessible to all its global partners in real time. The\nprimary benefit is:", "options": ["A. Reduced physical warehouse space", "B. Scalable, flexible collaboration and data sharing across global\nsupply chain partners in real time", "C. Elimination of the bullwhip effect", "D. Vertical integration of the supply chain"], "answer": "B", "explanation": "Cloud computing provides scalable, flexible computing resources and enables real-time collaboration across global supply chains. All partners can access the same data and planning tools --- as described in the Lecture 5 digital supply chain technologies."}, {"num": 76, "text": "A company uses prescriptive analytics to recommend optimal procurement\ndecisions based on supplier performance data, demand forecasts, and\nlogistics constraints. This represents which digital supply chain\ntechnology?", "options": ["A. Blockchain", "B. Internet of Things", "C. Artificial Intelligence and Data Analytics", "D. Additive Manufacturing"], "answer": "C", "explanation": "Prescriptive analytics --- recommending optimal decisions based on multiple data inputs --- is a form of AI and Data Analytics. It goes beyond descriptive (what happened) and predictive (what will happen) to recommend what to do."}, {"num": 77, "text": "The evolution of Digital Supply Chains started with which foundational\ntechnologies before progressing to AI and Digital Twins?", "options": ["A. Blockchain and IoT", "B. ERP systems and cloud adoption", "C. Additive manufacturing and robotics", "D. Autonomous vehicles and drone delivery"], "answer": "B", "explanation": "According to your Lecture 5 slides, the evolution of digital supply chains started with ERP (Enterprise Resource Planning) systems and cloud adoption, providing the data integration foundation that enabled later AI, IoT, and Digital Twin implementations."}, {"num": 78, "text": "An IoT system in a food supply chain detects that a refrigerated\ntruck's temperature has risen above safe levels mid-journey. The system\nautomatically reroutes the truck to the nearest cold storage facility.\nThis demonstrates which IoT capability?", "options": ["A. Product traceability from farm to consumer", "B. Condition monitoring enabling automated supply chain intervention", "C. Smart contract execution", "D. Digital twin simulation"], "answer": "B", "explanation": "IoT enables condition monitoring --- continuously tracking physical parameters (temperature, humidity) and triggering automated responses when thresholds are breached. This is a key IoT application in cold chain supply management."}, {"num": 79, "text": "A company's digital supply chain strategy focuses on \"automation,\npredictive analytics, and decision intelligence.\" Which maturity level\nis this most consistent with?", "options": ["A. Digitally Immature", "B. Digitally Enabled", "C. Digitally Transformed", "D. Traditional supply chain management"], "answer": "C", "explanation": "Automation, predictive analytics, and decision intelligence are hallmarks of a Digitally Transformed supply chain, where technology becomes the strategic backbone and decisions become predictive and autonomous."}, {"num": 80, "text": "A manufacturer implements automated chatbots to handle 70% of customer\nservice queries about order status, delivery times, and returns. This is\nan application of:", "options": ["A. Internet of Things", "B. Blockchain smart contracts", "C. AI-powered supply chain automation --- specifically chatbots for\ncustomer service", "D. Digital Twin technology"], "answer": "C", "explanation": "AI-powered chatbots for customer service automation are explicitly listed in your lecture slides as an application of AI and Data Analytics in the digital supply chain. They enhance responsiveness and reduce manual workload."}, {"num": 81, "text": "A global fashion company experiences seasonal demand spikes that cause\nsignificant overproduction and waste. They implement a cloud-based\ndemand sensing platform that all suppliers, factories, and logistics\npartners can access. The expected outcome is:", "options": ["A. Increased bullwhip effect due to more data", "B. Better synchronisation across the supply chain, reducing\noverproduction and improving responsiveness", "C. Reduced need for any inventory", "D. Elimination of the need for logistics providers"], "answer": "B", "explanation": "A shared cloud platform gives all supply chain partners visibility of the same demand signals, enabling synchronised responses. This directly combats the bullwhip effect and reduces the overproduction caused by information asymmetry."}, {"num": 82, "text": "Which of the following is NOT listed as a key technology in a Digital\nSupply Chain in your lectures?", "options": ["A. Smart Factories", "B. Blockchain", "C. 5G Mobile Networks", "D. Digital Twins"], "answer": "C", "explanation": "The 8 key technologies listed in your Lecture 5 slides are: Smart Factories, Smart Warehouses, Smart Logistics, Cloud Computing & Digital Platforms, AI & Data Analytics, Blockchain, IoT, and Digital Twins. 5G is an enabler but not listed as one of the 8 core DSC technologies."}, {"num": 83, "text": "A company installs sensors on all of its 500 delivery trucks to track\nlocation, speed, fuel consumption, and engine health in real time. The\ndata feeds into a central analytics platform. Which technology is the\nfoundation of this system?", "options": ["A. Blockchain", "B. Additive Manufacturing", "C. Internet of Things (IoT)", "D. Digital Twin"], "answer": "C", "explanation": "IoT refers to sensors and connected devices that track real-world assets and transmit data. Fleet monitoring with sensors reporting location, fuel, and engine health is a classic IoT application in supply chain logistics."}, {"num": 84, "text": "An Industry 4.0 smart factory can automatically adjust its production\nschedule when a supply disruption is detected by a connected sensor\nupstream. This is an example of:", "options": ["A. Push-based production", "B. Cyber-Physical Systems enabling adaptive manufacturing in response to\nreal-time signals", "C. Centralised warehousing", "D. Demand-driven forecasting only"], "answer": "B", "explanation": "Industry 4.0 smart factories use Cyber-Physical Systems (CPS) to integrate physical operations with real-time digital data. Automatically adjusting production in response to a detected upstream disruption is adaptive manufacturing enabled by CPS."}, {"num": 85, "text": "A company's digital supply chain roadmap lists: Year 1 --- ERP rollout;\nYear 2 --- IoT tracking; Year 3 --- AI predictive analytics; Year 4 ---\nDigital Twins. This progression reflects:", "options": ["A. The correct evolution path toward a Digitally Transformed supply\nchain", "B. An incorrect sequence --- Digital Twins should come first", "C. A push-based strategy evolution", "D. A network design decision"], "answer": "A", "explanation": "This progression mirrors the academic and industry evolution of digital supply chains: starting with foundational ERP integration, adding real-time visibility via IoT, layering AI prediction, and eventually reaching Digital Twins for simulation --- moving from digitally enabled toward digitally transformed."}, {"num": 86, "text": "A retailer uses AI-driven chatbots to answer customer questions about\ndelivery, alongside IoT for real-time tracking and cloud platforms for\npartner collaboration. This combination of technologies is best\ndescribed as:", "options": ["A. A vertically integrated supply chain", "B. A digitally enabled supply chain using multiple complementary\ntechnologies", "C. An additive manufacturing network", "D. A push-based digital platform"], "answer": "B", "explanation": "Using multiple digital technologies (AI chatbots, IoT tracking, cloud collaboration) in an integrated way to improve efficiency represents a digitally enabled supply chain --- working toward digital transformation through technology integration."}, {"num": 87, "text": "A blockchain platform is used in a digital supply chain to ensure that\nwhenever goods change hands between supply chain partners, the\ntransaction is recorded in an immutable, shared ledger. Which digital\nsupply chain benefit does this primarily provide?", "options": ["A. Faster physical delivery of goods", "B. Reduction in production costs", "C. Transparency and trust between supply chain partners through\nimmutable transaction records", "D. Reduction in safety stock requirements"], "answer": "C", "explanation": "Blockchain's primary value in digital supply chains is transparency and trust. Its immutable, decentralised ledger means all partners see the same verified transaction history --- reducing fraud, disputes, and the need for intermediary trust."}, {"num": 88, "text": "A company's supply chain team uses big data analytics to identify that\na specific supplier has been consistently late on 30% of orders over the\npast year. They use this insight to diversify their supplier base. This\nis an example of:", "options": ["A. IoT condition monitoring", "B. Digital twin simulation", "C. AI and data analytics enabling data-driven supply chain risk\nmanagement", "D. Blockchain traceability"], "answer": "C", "explanation": "Big data analytics applied to supplier performance history is a form of AI and Data Analytics in supply chain management. Identifying patterns (30% late deliveries) and acting on them (diversifying suppliers) is data-driven risk management."}, {"num": 89, "text": "What was the primary driver of Digital Supply Chain emergence according\nto your lectures?", "options": ["A. The invention of the internet in 1990", "B. Globalisation, automation, and the Fourth Industrial Revolution\n(Industry 4.0)", "C. The rise of social media marketing", "D. Government regulation requiring digital reporting"], "answer": "B", "explanation": "Your Lecture 5 slides state that Digital Supply Chains emerged primarily due to globalisation (requiring global coordination), automation (enabling efficiency), and Industry 4.0 (connecting physical and digital systems)."}, {"num": 90, "text": "A micro-fulfilment centre is a small, automated warehouse located inside\nor near an urban area to enable same-day delivery. Which digital supply\nchain technology primarily enables its efficient operation?", "options": ["A. Blockchain provenance tracking", "B. Smart warehouse technology --- AI, automation, and robotics for\npicking, packing, and dispatching", "C. Digital twin for vessel routing", "D. Additive manufacturing of products on-site"], "answer": "B", "explanation": "Micro-fulfilment centres are an application of smart warehouse technology. AI-driven picking robots, automated conveyors, and real-time inventory management enable the fast, accurate processing needed for same-day urban fulfilment."}, {"num": 91, "text": "A company says it has \"reimagined its processes\" rather than simply\n\"digitising existing processes.\" This distinction is key to which\nlevel of digital maturity?", "options": ["A. Digitally Immature", "B. Digitally Enabled", "C. Digitally Transformed", "D. Traditional supply chain"], "answer": "C", "explanation": "A Digitally Transformed supply chain does not simply automate existing processes --- it reimagines how work is done, using digital capabilities to design entirely new operating models. This is a core distinction from being merely Digitally Enabled."},
