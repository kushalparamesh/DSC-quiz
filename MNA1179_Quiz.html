his approach. Which\nsustainability benefit does this deliver?", "options": ["A. Digital Twins eliminate the need for physical vehicles", "B. Route optimisation and real-time fuel tracking reduce unnecessary\ndriving, fuel consumption, and CO2 emissions --- advancing green\nlogistics objectives", "C. Digital Twins generate renewable energy for supply chain operations", "D. Digital Twins replace suppliers with virtual ones"], "answer": "B", "explanation": "DHL's Digital Twins helped cut CO2 emissions by optimising fuel consumption and reducing empty miles in transportation. Real-time carbon footprint tracking ensures compliance with sustainability goals --- a key DHL Digital Twin outcome in your lecture case study."}, {"num": 195, "text": "A supply chain manager says: \"We run weekly simulations to test our\ncontingency plans.\" A competitor says: \"Our Digital Twin continuously\ntests scenarios in real time.\" What is the fundamental operational\ndifference?", "options": ["A. There is no difference --- simulations and Digital Twins are the same", "B. The competitor's Digital Twin operates on live, continuously updated\ndata and can respond to real-world events as they develop; the\nmanager's simulation uses static, predefined conditions run only weekly", "C. Simulations are more sophisticated than Digital Twins", "D. Digital Twins only test one scenario at a time"], "answer": "B", "explanation": "This is the simulation vs. Digital Twin distinction from your lecture slides. Simulations are run periodically on static data. Digital Twins update in real time with live operational data, enabling continuous scenario testing as real conditions evolve."}, {"num": 196, "text": "An agricultural company uses Digital Twins to monitor crop conditions,\nsoil health, and weather patterns simultaneously. The twin predicts\nyield one month in advance and optimises harvest scheduling. This\nDigital Twin application directly improves:", "options": ["A. Maritime vessel routing", "B. Agricultural supply chain planning --- yield prediction and harvest\nscheduling enabling proactive supply chain preparation", "C. Cold chain pharmaceutical compliance", "D. Humanitarian aid distribution"], "answer": "B", "explanation": "Agricultural Digital Twins monitor crop and soil conditions, predict yield, and optimise harvest scheduling --- enabling better supply chain planning (booking logistics capacity, informing processing and storage) well in advance of harvest."}, {"num": 197, "text": "A Digital Twin is described as enabling \"predictive maintenance\" in\nmanufacturing. How does a Digital Twin deliver this capability?", "options": ["A. By hiring maintenance workers in advance", "B. By continuously monitoring real-time machine performance data\n(vibration, temperature, output quality) and using AI to detect patterns\nthat precede failures --- scheduling maintenance before breakdowns occur", "C. By simulating maintenance schedules based on manufacturer\nrecommendations only", "D. By replacing machines when they reach 5 years old"], "answer": "B", "explanation": "Digital Twin predictive maintenance uses live sensor data from machines and AI pattern recognition to predict failures before they happen. Maintenance is scheduled based on actual machine condition rather than arbitrary time intervals --- reducing downtime and repair costs."}, {"num": 198, "text": "A closed-loop supply chain Digital Twin tracks products across their\nentire lifecycle --- from manufacture through use, return, and\nrecycling. It enables predictive maintenance to extend product life and\noptimises reverse logistics. This demonstrates:", "options": ["A. Digital Twins for humanitarian supply chains", "B. Circular economy Digital Twin --- enabling end-to-end lifecycle\ntracking and reverse logistics optimisation", "C. Maritime Digital Twin for vessel monitoring", "D. Cold chain Digital Twin for temperature compliance"], "answer": "B", "explanation": "Closed-loop supply chain Digital Twins are used to track products across their entire lifecycle, enable predictive maintenance (extending product life), and optimise reverse logistics (returns, refurbishment, recycling) --- directly supporting circular economy objectives."}, {"num": 199, "text": "A supply chain Digital Twin shows that if Supplier A is delayed by 3\ndays, Production Line B will run out of components on Day 5, causing a\n2-day production halt, delaying Customer C's order by 4 days. Without\nthe Digital Twin, this cascade would not be visible until it happened.\nThis demonstrates which Digital Twin benefit?", "options": ["A. Cost reduction through cheaper raw materials", "B. End-to-end supply chain visibility and impact propagation modelling\n--- understanding how disruptions cascade through the supply chain\nbefore they materialise", "C. Elimination of the bullwhip effect", "D. Automated blockchain contract execution"], "answer": "B", "explanation": "Digital Twins provide end-to-end supply chain visibility --- seeing how a disruption at one node propagates through the entire system. This cascade analysis is only possible with a live, connected model of all supply chain components."}, {"num": 200, "text": "DHL's Digital Twin implementation resulted in the following SPECIFIC\nimprovements: warehouse processing time reduced by \\_\\_\\_%, delivery\ntimes improved by \\_\\_--\\_\\_%, and sustainability gains through\noptimised fuel consumption. What are the correct numbers?", "options": ["A. 20%, 10--15%", "B. 30%, 15--20%", "C. 50%, 25--30%", "D. 10%, 5--10%\n\nSECTION: ADDITIVE MANUFACTURING"], "answer": "B", "explanation": "Your DHL case study lecture slide states: warehouse processing time reduced by up to 30%; delivery times improved by 15--20% due to real-time route adjustments. These specific figures are highly likely to appear in an applied quiz question. ADDITIVE MANUFACTURING"}, {"num": 201, "text": "Additive Manufacturing (AM) differs from traditional manufacturing in\nthat it:", "options": ["A. Removes material from a solid block to create a part (subtractive)", "B. Builds objects layer by layer from a digital model (additive),\nreducing material waste compared to subtractive methods", "C. Only works with metal materials", "D. Requires larger production runs to be cost-effective"], "answer": "B", "explanation": "AM builds objects layer by layer from digital models (3D printing) --- as opposed to subtractive manufacturing which removes material by cutting, drilling, or milling. This additive process inherently generates less waste."}, {"num": 202, "text": "A manufacturer uses 3D printing to produce a customised prosthetic limb\nthat perfectly matches a patient's anatomy. This is an application of\nAM in which supply chain sector?", "options": ["A. Maritime supply chain", "B. Agricultural supply chain", "C. Healthcare supply chain --- custom implants, prosthetics, and\nbioprinting", "D. Cold supply chain"], "answer": "C", "explanation": "Healthcare AM applications listed in your lecture include custom implants, prosthetics, and bioprinting. 3D printing enables truly personalised medical devices that cannot be economically produced through traditional mass manufacturing."}, {"num": 203, "text": "Toys \"R\" Us in Hong Kong collaborated with 3D Systems to produce\ncustomised mini-ducks in store using 3D printing. Which supply chain\nbenefit did this primarily demonstrate?", "options": ["A. Economies of scale through large-batch production", "B. Decentralised, on-demand manufacturing enabling product customisation\nand reduced inventory costs", "C. Centralised production at a single global factory", "D. Blockchain-verified product authenticity"], "answer": "B", "explanation": "The Toys \"R\" Us case study demonstrates decentralised AM: in-store, on-demand 3D printing of customised products eliminates the need for central production, warehousing, and shipping of pre-made inventory --- reducing inventory costs and enabling personalisation."}, {"num": 204, "text": "During COVID-19, hospitals faced critical shortages of PPE (personal\nprotective equipment). Several hospitals used 3D printers to produce\nface shields, ventilator components, and swabs locally. This\ndemonstrates AM's role in:", "options": ["A. Traditional mass production scaling", "B. Supply chain resilience --- enabling local, rapid production during\nsupply disruptions when global supply chains fail", "C. Cold chain management", "D. Centralised production cost reduction"], "answer": "B", "explanation": "AM's role in supply chain resilience is directly covered in your lecture. During COVID-19 disruptions, AM enabled rapid, decentralised production of critical supplies without depending on global supply chains --- a powerful resilience capability."}, {"num": 205, "text": "A ship is mid-voyage when a critical component fails. The nearest port\nwith the replacement part is 5 days away. The ship's onboard 3D printer\nproduces a functional replacement part in 6 hours. This is an example\nof:", "options": ["A. AM in agricultural supply chains", "B. AM in maritime supply chains --- on-demand spare parts production for\nships, eliminating long delays and inventory costs", "C. AM in humanitarian supply chains", "D. Digital twin spare parts management"], "answer": "B", "explanation": "Your lecture slides list \"on-demand spare parts for ships\" as a maritime supply chain AM application. Instead of carrying vast physical inventories of spare parts or waiting for delivery, ships with 3D printing capability can manufacture parts on demand."}, {"num": 206, "text": "A manufacturer uses AM for decentralised production --- printing parts\nnear customer locations rather than in a central factory. Compared to\ncentralised production, this approach:", "options": ["A. Increases transportation costs and lead times", "B. Reduces transportation costs and lead times by manufacturing near the\npoint of demand, but may sacrifice some economies of scale", "C. Always reduces unit production costs", "D. Requires more inventory storage than centralised production"], "answer": "B", "explanation": "Decentralised AM production reduces transport distances and lead times by manufacturing near customers. However, it may sacrifice the economies of scale achievable in centralised large-batch production --- a key trade-off presented in your lecture."}, {"num": 207, "text": "The global AM market is expected to grow from $16 billion by 2025 to\n$196 billion by 2035. What primarily drives this growth, according to\nyour lectures?", "options": ["A. Government mandates requiring all manufacturers to use AM", "B. Decreasing material costs, increasing automation making AM more\ncost-effective and scalable, and wider industry adoption", "C. AM becoming cheaper than all traditional manufacturing methods\nimmediately", "D. Digital Twins replacing the need for physical AM machines"], "answer": "B", "explanation": "Your lecture slides cite declining material costs, increased automation driving cost-effectiveness and scalability, and wider adoption across industries as the drivers of AM market growth toward $196 billion by 2035."}, {"num": 208, "text": "A fashion accessories brand uses AM to produce personalised products for\neach customer --- engraved with the customer's name and in their chosen\ncolour configuration. Traditional mass production cannot achieve this\neconomically. Which AM advantage is being leveraged?", "options": ["A. AM's ability to produce at the same cost as mass production", "B. AM's customisation capability --- enabling personalised, one-off\nproducts at economical cost", "C. AM's faster production speed than injection moulding", "D. AM's ability to use any material"], "answer": "B", "explanation": "Customisation is one of AM's core supply chain advantages listed in your lecture. Traditional manufacturing requires expensive tooling changes for each variant. AM produces each item from a digital file without tooling --- making personalisation economically viable."}, {"num": 209, "text": "A 3D printing company uses AM with recycled plastic from returned\nconsumer goods to produce new products. This AM application directly\nsupports:", "options": ["A. Just-in-Time supply chain strategy", "B. Circular economy --- AM supporting recycling and remanufacturing of\nmaterials to reduce waste", "C. Cold chain compliance", "D. Centralised production economies of scale"], "answer": "B", "explanation": "AM supports the circular economy by enabling recycling and remanufacturing. Recycled materials can be used as AM input, and returned products can be reprocessed into new items --- reducing waste and supporting sustainable supply chain objectives."}, {"num": 210, "text": "China's manufacturing sector faced rising labour costs and global\nsupply chain complexities. The government supported AM adoption through\nresearch centres and subsidies. Chinese manufacturers leveraged what\nyour lectures call \"imitative innovation.\" What does this mean?", "options": ["A. Copying competitor products illegally", "B. Rapidly adapting and improving existing global AM technology to fit\nlocal production needs and cost structures, then expanding\ninternationally", "C. Ignoring global AM trends and developing entirely new manufacturing\nprocesses", "D. Using blockchain to protect manufacturing intellectual property"], "answer": "B", "explanation": "The Toys \"R\" Us/China case study describes \"imitative innovation\": Chinese manufacturers adapted existing global AM technologies (pioneered by companies like 3D Systems) to their local context, developed affordable machines, and used this as a springboard for global market expansion."}, {"num": 211, "text": "A company uses AM to produce only the exact quantity of parts needed for\ncurrent orders, eliminating the need to hold large inventories of\nfinished or semi-finished goods. This is most closely aligned with:", "options": ["A. Push-based supply chain --- building to forecast", "B. Just-in-Time/demand-driven production --- AM enabling on-demand\nmanufacturing that eliminates inventory holding", "C. Centralised warehousing strategy", "D. Vertical integration of the supply chain"], "answer": "B", "explanation": "AM's on-demand production capability aligns with pull/JIT principles: produce exactly what is needed, when it is needed, in the quantity needed. This eliminates the need for pre-built inventory, reducing holding costs and obsolescence risk."}, {"num": 212, "text": "AM is described as having \"reduced lead times\" as a supply chain\nadvantage. Why does AM reduce lead times compared to traditional\nmanufacturing?", "options": ["A. AM machines operate faster than all traditional manufacturing methods", "B. AM eliminates tooling creation and changeover times, enables direct\ndigital-to-physical production, and can be located close to the customer\n--- each dramatically reducing time-to-produce", "C. AM only reduces lead times for metal parts", "D. AM reduces lead times only when combined with blockchain"], "answer": "B", "explanation": "AM reduces lead times by: eliminating the need to create moulds/tools (weeks saved), enabling direct digital-to-physical production (design changes take minutes), and enabling decentralised production near customers (transport time eliminated)."}, {"num": 213, "text": "A humanitarian organisation uses 3D printing to produce emergency\nmedical tools and temporary shelter components in disaster zones within\nhours of a disaster striking. This AM application is in:", "options": ["A. Cold supply chain", "B. Maritime supply chain", "C. Humanitarian supply chain --- producing emergency response supplies\non-site and on-demand", "D. Agricultural supply chain"], "answer": "C", "explanation": "Your lecture lists humanitarian AM applications as: emergency response supplies including medical tools and shelters. AM enables on-site production of critical items in disaster zones where supply chains are disrupted or inaccessible."}, {"num": 214, "text": "AM is said to enable \"extended product life\" as a sustainability\nbenefit. How does AM achieve this?", "options": ["A. AM makes products heavier and more durable", "B. AM enables easy, on-demand production of spare parts --- allowing\nproducts to be repaired instead of replaced when a component fails", "C. AM coats products with protective materials", "D. AM only extends the life of metal products"], "answer": "B", "explanation": "AM enables extended product life by making spare part production economically viable on demand. Instead of discarding a product because a specific component is no longer available, AM can produce that part to order --- reducing waste and product replacement."}, {"num": 215, "text": "A key CHALLENGE of AM adoption listed in your lectures is \"high\nequipment costs.\" How does this challenge affect supply chain adoption\ndecisions?", "options": ["A. High equipment costs make AM cheaper than traditional manufacturing\nimmediately", "B. High initial AM machine and material costs create a significant\ncapital investment barrier, making AM currently most cost-effective for\nsmall batches and high-value customised parts rather than mass\nproduction", "C. High equipment costs only affect healthcare AM adoption", "D. High equipment costs are already lower than traditional manufacturing\ncosts\n\nSECTION: CROSS-TOPIC APPLIED"], "answer": "B", "explanation": "AM machine costs remain high, and material costs (specialist powders, filaments, resins) add up. This makes AM economically superior for small batches, complex geometries, and high-value customised items --- but not yet competitive with traditional mass production for standard high-volume parts. CROSS-TOPIC APPLIED"}, {"num": 216, "text": "A pharmaceutical company wants to ensure vaccine integrity from\nmanufacturer to patient. Which combination of digital supply chain\ntechnologies would provide the MOST comprehensive solution?", "options": ["A. Only AI demand forecasting", "B. IoT (temperature monitoring throughout transit) + Blockchain\n(immutable custody and compliance records) + Digital Twin (real-time\nsimulation of cold chain conditions) working together", "C. Only Additive Manufacturing of vaccine components on-site", "D. Only cloud computing for document storage"], "answer": "B", "explanation": "An optimal vaccine cold chain uses: IoT for continuous temperature monitoring, blockchain for tamper-proof custody records and compliance documentation, and Digital Twins for real-time simulation of the entire cold chain. No single technology achieves all three objectives."}, {"num": 217, "text": "A company transitions from a Digitally Immature to a Digitally\nTransformed supply chain. In the correct sequence, which technologies\nshould be implemented first, second, and third?", "options": ["A. Digital Twins first, then IoT, then ERP", "B. ERP/Cloud for data integration foundation → IoT for real-time\nvisibility → AI for predictive analytics and autonomous decisions →\nDigital Twins for simulation", "C. Blockchain first to establish trust, then AI, then IoT", "D. Additive Manufacturing first, then Blockchain, then Digital Twins"], "answer": "B", "explanation": "The digital supply chain evolution follows: foundation (ERP, cloud integration) → visibility (IoT real-time tracking) → intelligence (AI predictive analytics) → full simulation (Digital Twins). Each layer depends on the capabilities of the previous one."}, {"num": 218, "text": "A fast-food chain experiences supply chain disruptions during peak\nseasons. A consultant recommends: (1) AI for demand forecasting, (2)\nblockchain for supplier transparency, (3) Digital Twins for scenario\nplanning, and (4) IoT for inventory tracking. The CEO asks which\ndelivers FASTEST ROI. According to your course concepts, which is most\nlikely the answer?", "options": ["A. Digital Twin for scenario planning (most complex)", "B. AI for demand forecasting --- directly reduces stockouts and\noverstocking, with measurable cost impact from day one", "C. Blockchain for supplier transparency (most transformational)", "D. IoT for inventory tracking (hardware-intensive)"], "answer": "B", "explanation": "AI demand forecasting typically delivers fastest ROI by immediately reducing the costs of stockouts (lost sales) and overstocking (waste, holding costs). It requires less infrastructure change than IoT hardware, less network coordination than blockchain, and less modelling effort than Digital Twins."}, {"num": 219, "text": "According to the digital supply chain maturity model, a company with\n\"reactive decision-making, fragmented data, and minimal tech support\"\nwants to reach \"predictive and autonomous decisions with intelligent\nreal-time processes.\" How many maturity stages must it cross?", "options": ["A. One stage --- directly from Immature to Transformed", "B. Two stages --- from Digitally Immature through Digitally Enabled to\nDigitally Transformed", "C. Three stages --- there are four maturity levels", "D. Zero stages --- it already meets the criteria"], "answer": "B", "explanation": "The maturity model has three stages: Digitally Immature (reactive, fragmented, minimal tech) → Digitally Enabled (efficiency tool, data-assisted, integrated) → Digitally Transformed (strategic backbone, predictive/autonomous, intelligent real-time). From Immature to Transformed crosses two stage boundaries."}, {"num": 220, "text": "A global retailer uses (1) blockchain to verify supplier ESG compliance,\n(2) AI to optimise logistics routes and reduce emissions, (3) IoT to\nmonitor energy use in warehouses, and (4) Digital Twins to simulate\nlow-carbon supply chain scenarios. This integrated technology strategy\nis primarily aimed at:", "options": ["A. Reducing customer service costs", "B. Achieving supply chain sustainability objectives through integrated\ndigital technologies", "C. Eliminating all human workers from the supply chain", "D. Reducing the need for warehouse facilities"], "answer": "B", "explanation": "This integrated technology strategy directly addresses supply chain sustainability: blockchain verifies ethical sourcing, AI optimises for low emissions, IoT monitors energy use, and Digital Twins model sustainable scenarios. All four work together toward a common sustainability objective."}, {"num": 221, "text": "A supply chain manager needs to detect a fraudulent invoice from a\nsupplier AND explain to auditors why it was flagged. Which combination\nof technologies best enables both capabilities?", "options": ["A. Blockchain alone (immutability prevents fraud but doesn't explain\nflagging)", "B. AI with XAI --- AI detects the fraudulent pattern; XAI explains the\nspecific risk indicators that triggered the fraud flag, providing the\nauditor-ready justification", "C. Digital Twin simulation of the payment process", "D. IoT tracking of physical goods only"], "answer": "B", "explanation": "AI detects fraud by identifying patterns in transaction data. XAI then explains which specific risk indicators (unusual payment amount, new counterparty, irregular timing) triggered the flag --- providing the transparent, auditable justification auditors require."}, {"num": 222, "text": "A company's supply chain is described as: \"All decisions made by AI\nautonomously; managers focus only on exceptions; real-time Digital Twins\nupdate every 30 seconds; blockchain records every transaction.\" This\nrepresents which supply chain maturity level?", "options": ["A. Digitally Immature", "B. Digitally Enabled", "C. Digitally Transformed", "D. Digitally Mature"], "answer": "C", "explanation": "Autonomous AI decisions, real-time Digital Twin updates, and blockchain integration represent the highest described maturity level in your lectures: Digitally Transformed. Technology is the strategic backbone; decisions are predictive, autonomous, and continuously optimised."}, {"num": 223, "text": "A humanitarian aid organisation wants to simultaneously (1) predict\nwhich disaster zones need supplies most urgently, (2) track aid\ndistribution to prevent fraud, (3) verify supplier authenticity of\ndonated medicines, and (4) optimise delivery routes in real time. Which\nset of technologies maps to these four needs?", "options": ["A. All solved by IoT alone", "B. AI (demand prediction) + Blockchain (fraud prevention and supplier\nverification) + Smart Logistics/AI (route optimisation)", "C. Digital Twin + ERP + Additive Manufacturing", "D. Centralised warehousing + push production"], "answer": "B", "explanation": "Humanitarian supply chains benefit from: AI for demand prediction in crisis zones, blockchain for anti-fraud aid distribution tracking and medicine authentication, and smart logistics/AI for real-time route optimisation. This multi-technology approach is supported by your lecture content on humanitarian applications of each technology."}, {"num": 224, "text": "COVID-19 simultaneously triggered four changes in supply chain thinking.\nWhich combination from your lectures is correct?", "options": ["A. Shift from JIC to JIT; decreased digitalisation; increased manual\nprocesses; reduced AI adoption", "B. Exposed supply chain vulnerabilities; accelerated digital supply\nchain adoption; shift from JIT to JIC; increased reliance on AI,\nautomation, and cloud-based demand forecasting", "C. Eliminated the bullwhip effect; introduced blockchain; removed\ninventory requirements", "D. Shifted from pull to push supply chains; reduced IoT adoption"], "answer": "B", "explanation": "Your Lecture 5 COVID-19 slide lists all four: exposed vulnerabilities (fragility of global lean supply chains), accelerated digital adoption (resilience through technology), JIT → JIC inventory shift, and increased AI/automation/cloud reliance for demand forecasting."}, {"num": 225, "text": "A retail company wants to implement \"farm-to-table transparency\" for\nits fresh produce. Which technology provides the traceability backbone,\nand which technology provides real-time condition monitoring during\ntransport?", "options": ["A. AI (traceability) + Digital Twin (condition monitoring)", "B. Blockchain (traceability --- immutable chain of custody from farm to\nshelf) + IoT (real-time temperature and condition monitoring during\ntransport)", "C. Additive Manufacturing (traceability) + Cloud Computing (condition\nmonitoring)", "D. ERP (traceability) + Smart Factory (condition monitoring)"], "answer": "B", "explanation": "Blockchain provides the immutable, transparent chain of custody from farm to shelf (provenance traceability). IoT sensors provide real-time temperature, humidity, and location monitoring during transport. Together they create comprehensive cold chain food traceability."}, {"num": 226, "text": "A supply chain student argues: \"Digital Twins, AI, and IoT do the same\nthing --- they all use real-time data.\" Which response best\ndemonstrates understanding of each technology's distinct role?", "options": ["A. The student is correct --- all three are interchangeable", "B. IoT collects real-time data; AI analyses and learns from it; Digital\nTwins use both IoT data and AI to create a live virtual model that can\nbe simulated and optimised --- each has a distinct function", "C. AI and Digital Twins are the same; IoT is different", "D. IoT and Blockchain are the same; Digital Twins are different"], "answer": "B", "explanation": "Each technology has a distinct role: IoT is the data collection layer (sensors gathering real-world signals), AI is the intelligence layer (learning, predicting, recommending), Digital Twin is the simulation layer (virtual model integrating data and AI for comprehensive supply chain modelling)."}, {"num": 227, "text": "A company claims its supply chain is \"sustainable, ethical, and\nresilient.\" To credibly support all three claims, which combination of\ntechnologies would provide the most convincing evidence?", "options": ["A. Only smart factories demonstrating clean production", "B. Blockchain (verifying ethical sourcing and sustainability claims), AI\n(optimising for low emissions and efficient operations), Digital Twins\n(modelling resilience scenarios), IoT (monitoring real-world\nsustainability metrics)", "C. Only AI demand forecasting and cost reduction", "D. Only additive manufacturing reducing transport emissions"], "answer": "B", "explanation": "Sustainability (IoT environmental monitoring + AI optimisation), ethics (blockchain supply chain verification), and resilience (Digital Twin scenario testing) each require specific technologies. Only the combined approach credibly supports all three claims."}, {"num": 228, "text": "A student asks: \"What is the strategic difference between a company\nusing AI for supply chain and a company using XAI for supply chain?\"\nWhat is the best answer?", "options": ["A. There is no difference --- AI and XAI produce identical outcomes", "B. AI provides automation and prediction; XAI adds the transparency\nlayer that allows managers to understand, trust, challenge, and comply\nwith regulatory requirements for AI decisions --- enabling responsible\nadoption", "C. XAI is only used for financial applications; AI for logistics", "D. AI is used in small companies; XAI in large ones"], "answer": "B", "explanation": "AI delivers predictive and automated capabilities. XAI adds interpretability --- enabling managers to trust, validate, and where necessary override AI recommendations. For regulated industries and high-stakes decisions, XAI is essential for responsible deployment and compliance (e.g., EU AI Act)."}, {"num": 229, "text": "An e-commerce company wants to move from batch forecasting (weekly,\nusing spreadsheets) to real-time, AI-driven demand sensing that adjusts\ninventory automatically. According to the digital supply chain maturity\nmodel, this transition moves the company from which level to which?", "options": ["A. From Digitally Transformed to Digitally Enabled", "B. From Digitally Immature/Enabled (reactive, data-assisted, manual\nprocesses) to Digitally Transformed (predictive, autonomous, intelligent\nreal-time processes)", "C. From Digitally Enabled to Digitally Immature", "D. From Industry 4.0 to Industry 3.0"], "answer": "B", "explanation": "Weekly spreadsheet forecasting = Digitally Immature or Enabled (data-assisted, reactive). Real-time AI-driven demand sensing with automatic inventory adjustment = Digitally Transformed (predictive, autonomous, intelligent real-time processes). This is a significant maturity step."}, {"num": 230, "text": "A supply chain consulting firm is asked to recommend the single\ntechnology that would deliver the greatest improvement to a supply chain\nthat has: (1) frequent stockouts, (2) unknown product locations, (3)\nsupplier fraud suspicions, and (4) reactive (not proactive) disruption\nmanagement. What would they most likely recommend as the FIRST priority?", "options": ["A. Additive Manufacturing --- to produce items locally and eliminate\nstockouts", "B. End-to-end supply chain visibility through IoT + AI as the foundation\n--- addressing unknown product locations and improving demand sensing,\nwhich underpins all other improvements", "C. Blockchain alone --- to address supplier fraud first", "D. Digital Twins --- for disruption scenario planning"], "answer": "B", "explanation": "Visibility is the foundation of all supply chain improvement. Without knowing where products are (IoT) and what demand is doing (AI), you cannot address stockouts, verify suppliers, or plan for disruptions. Visibility must come first --- enabling all subsequent improvements."}, {"num": 231, "text": "A company's digital supply chain roadmap shows: \"Phase 1 --- Basic\nERP; Phase 2 --- IoT Tracking; Phase 3 --- AI Forecasting; Phase 4 ---\nDigital Twins; Phase 5 --- Blockchain for all partner transactions.\" A\nboard member asks why blockchain comes last. What is the best\njustification?", "options": ["A. Blockchain should always come first to establish trust", "B. Blockchain requires all supply chain partners to adopt a common\nplatform --- this requires established digital relationships (Phases\n1--4) and partner trust before multi-party blockchain can be effectively\nimplemented", "C. Blockchain is too expensive compared to earlier phases", "D. Blockchain is only useful after Digital Twins are established"], "answer": "B", "explanation": "Blockchain is a network technology --- its value depends on all key supply chain partners adopting a common platform. This is easiest once digital relationships are established, data flows are trusted, and partners are already collaborating digitally (enabled by earlier phases)."}, {"num": 232, "text": "A global manufacturer uses AM to print spare parts on demand at customer\nsites around the world, using 3D printer files transmitted digitally.\nThey use blockchain to protect the digital designs from unauthorised\ncopying. This integration addresses which supply chain challenge?", "options": ["A. Demand forecasting inaccuracy", "B. AM cybersecurity and intellectual property (IP) protection --- a\nspecific AM challenge mentioned in your lectures, solved by\nblockchain-secured digital designs", "C. Cold chain temperature compliance", "D. Humanitarian aid distribution"], "answer": "B", "explanation": "Your lecture lists cybersecurity risks and IP protection as AM challenges. Blockchain can secure digital design files --- recording who has access, when files are used, and preventing unauthorised copying or modification --- protecting the IP that enables distributed AM supply chains."}, {"num": 233, "text": "A supply chain manager is asked to evaluate whether their company's AI\nsupplier recommendation system is \"ethical.\" Which approach best\ndemonstrates ethical AI practices in supply chain?", "options": ["A. Simply using any AI system available without further review", "B. Implementing XAI to make the recommendation logic transparent,\nauditing the training data for biases, establishing human oversight for\nall significant supplier decisions, and ensuring compliance with EU AI\nAct transparency requirements", "C. Replacing AI with manual processes entirely", "D. Only using AI for non-critical supply chain decisions"], "answer": "B", "explanation": "Ethical AI in supply chains requires: XAI transparency (visible reasoning), bias auditing (checking training data for unfair patterns), human oversight (accountability for consequential decisions), and regulatory compliance (EU AI Act). All four elements together constitute ethical AI practice."}, {"num": 234, "text": "JD.com's AI Control Tower 2.0 addressed the Bullwhip Effect.\nSeparately, blockchain technology also addresses the Bullwhip Effect.\nHow do these two technologies approach the same problem differently?", "options": ["A. They are identical in approach and cannot be used together", "B. AI addresses bullwhip by using real demand data for intelligent\nforecasting and autonomous reordering (reducing forecast errors);\nblockchain addresses it by creating transparent shared demand visibility\nacross all supply chain partners (eliminating information asymmetry)", "C. Blockchain causes the bullwhip effect; AI cures it", "D. Only AI can address the bullwhip effect; blockchain is irrelevant"], "answer": "B", "explanation": "Two different but complementary approaches: AI reduces bullwhip by improving forecast accuracy and automating responses to real demand signals (JD.com Control Tower 2.0). Blockchain reduces bullwhip by giving all supply chain tiers transparent access to the same demand data --- eliminating the distortion caused by information gaps."}, {"num": 235, "text": "A student preparing for the MNA1179 quiz is told the questions are\n\"applied concept\" questions like the sample questions shown in class.\nWhich study approach would be MOST effective?", "options": ["A. Memorising only definitions of each technology", "B. Understanding how each technology (AI, Blockchain, Digital Twins, AM,\nIoT) solves specific supply chain problems --- practising by applying\nconcepts to company scenarios and case studies (DHL, Unilever, JD.com,\nToys'R'Us)", "C. Reading only about the history of blockchain and AI", "D. Focusing only on the supply chain maturity model table\n\nSECTION: DIGITAL TWINS"], "answer": "B", "explanation": "Applied questions require scenario-based reasoning: given a company situation, which concept/technology applies and why? This requires understanding both the concept deeply AND how it maps to real supply chain problems --- exactly what the DHL, Unilever, JD.com, and Toys'R'Us case studies are designed to teach. DIGITAL TWINS"}, {"num": 236, "text": "A company's Digital Twin detects that a critical machine on Production\nLine 3 shows vibration patterns consistent with bearing failure within\n72 hours. The maintenance team is automatically scheduled. Meanwhile,\nprocurement is alerted to expedite a spare bearing order. This scenario\ndemonstrates:", "options": ["A. Traditional scheduled maintenance", "B. Digital Twin enabling coordinated, proactive supply chain response\n--- linking production monitoring to maintenance scheduling and\nprocurement in real time", "C. Blockchain-verified maintenance records", "D. AI demand forecasting for spare parts\n\nSECTION: AI & EXPLAINABLE AI"], "answer": "B", "explanation": "A sophisticated Digital Twin doesn't just detect a problem --- it triggers a coordinated response across multiple supply chain functions (maintenance scheduling + procurement alerting) simultaneously. This end-to-end coordination is a hallmark of Digitally Transformed supply chain management. AI & EXPLAINABLE AI"}, {"num": 237, "text": "A company's AI classifies 1,000 supplier invoices per day, flags 15 as\npotentially fraudulent, and pays the rest automatically. The CFO asks:\n\"How do I know the AI isn't flagging legitimate invoices?\" The answer\nthat should be given is:", "options": ["A. \"Trust the AI --- it has 99% accuracy\"", "B. \"Our XAI system provides specific risk indicators for each flagged\ninvoice --- the CFO can review the reasoning and override incorrect\nflags\"", "C. \"We can't explain AI decisions --- it's a black box\"", "D. \"The blockchain prevents any fraud from occurring\"\n\nSECTION: BLOCKCHAIN"], "answer": "B", "explanation": "XAI for fraud detection provides interpretable risk indicators for each flagged transaction. The CFO can review the specific reasons each invoice was flagged, assess whether they reflect genuine fraud signals, and override incorrect flags --- maintaining human accountability in automated systems. BLOCKCHAIN"}, {"num": 238, "text": "A supply chain sustainability report claims: \"All our raw materials are\nethically sourced and carbon neutral.\" A regulator asks for proof.\nWhich technology provides the most credible, tamper-proof evidence?", "options": ["A. A PDF report from the company's own systems", "B. Blockchain --- an immutable, third-party-verified ledger recording\nevery sourcing transaction, supplier certification, and carbon\nmeasurement from origin to final product", "C. An AI-generated sustainability forecast", "D. Digital twin simulation of the supply chain's carbon footprint\n\nSECTION: DIGITAL SUPPLY CHAIN"], "answer": "B", "explanation": "A company's own PDF reports can be falsified or cherry-picked. Blockchain's immutable, shared ledger --- recording actual transactions verified by multiple parties --- provides tamper-proof evidence that regulatory and third-party audits can trust. DIGITAL SUPPLY CHAIN"}, {"num": 239, "text": "A supply chain manager says: \"Our data is in 8 different systems that\ncan't talk to each other. We can't get a complete picture of our\nsupply chain.\" What is the PRIMARY foundational technology investment\nneeded before AI or Digital Twins can deliver value?", "options": ["A. Additive Manufacturing equipment", "B. Cloud computing and ERP integration --- creating a unified data\nfoundation that enables all other digital technologies to function", "C. Blockchain for all transactions", "D. IoT sensors for all products\n\nSECTION: SCM FOUNDATIONS"], "answer": "B", "explanation": "AI and Digital Twins require clean, integrated, accessible data to function. Fragmented data in siloed systems (8 systems that can't talk to each other) means no technology can deliver its potential. Cloud computing and ERP integration to unify data is the necessary foundation --- as the digital supply chain evolution history in your lectures confirms. SCM FOUNDATIONS"}, {"num": 240, "text": "A company experiences that its supply chain surplus has fallen from €150\nper unit to €80 per unit over two years, despite prices staying\nconstant. The root cause analysis finds that both logistics costs and\ninventory costs have risen significantly. According to SCM principles,\nwhat needs to happen?", "options": ["A. Increase the selling price to restore surplus", "B. Apply supply chain levers --- specifically Inventory (reduce excess\nstock), Capacity (optimise logistics networks), and Information (improve\ndemand visibility) to bring costs back down", "C. Reduce customer value delivery to match lower costs", "D. Switch entirely to a push-based supply chain strategy\n\nSECTION: ADDITIVE MANUFACTURING"], "answer": "B", "explanation": "Falling supply chain surplus due to rising costs requires applying supply chain levers strategically. Inventory, Capacity, and Information levers can each reduce costs: better demand information reduces safety stock (Inventory lever), network optimisation reduces logistics costs (Capacity lever). ADDITIVE MANUFACTURING"}, {"num": 241, "text": "A research report states that AM \"reduces waste compared to traditional\nsubtractive manufacturing.\" Why is this the case?", "options": ["A. AM processes operate at lower temperatures than traditional methods", "B. AM builds only what is needed, layer by layer, using only the\nmaterial required for the part --- unlike subtractive methods that start\nwith a large block and remove (waste) material", "C. AM requires no post-processing and therefore no additional material\nuse", "D. AM only works with biodegradable materials\n\nSECTION: AI & EXPLAINABLE AI"], "answer": "B", "explanation": "AM's material efficiency advantage is fundamental: it builds up objects layer by layer, using only the required material. Subtractive manufacturing starts with a raw block and removes material by cutting/milling --- waste can be 80--90% of the original material for some precision parts. AI & EXPLAINABLE AI"}, {"num": 242, "text": "A food distributor's AI demand forecast predicts that demand for a\nseasonal product will double next month. However, the XAI explanation\nreveals that this prediction is based entirely on data from an unusual\none-time promotional event last year --- not a genuine seasonal trend.\nThe supply chain manager should:", "options": ["A. Automatically follow the AI recommendation and double the order", "B. Adjust or override the forecast based on the XAI insight --- the\nunderlying data is not representative of true demand patterns", "C. Ignore the XAI explanation and rely purely on the AI output", "D. Implement blockchain to verify the promotional event data\n\nSECTION: NETWORK DESIGN"], "answer": "B", "explanation": "This is exactly why XAI is valuable. The AI may be technically accurate given its training data, but XAI reveals that the data driving the forecast is unrepresentative. The manager can use this insight to adjust the forecast and avoid a costly over-ordering mistake. NETWORK DESIGN"}, {"num": 243, "text": "A company models its distribution network and finds that Option A (2\nlarge DCs) has 15% lower total cost than Option B (6 regional DCs), but\nOption B delivers 40% faster to 80% of customers. A competitor offers\nnext-day delivery to those same customers. Which option should the\ncompany choose?", "options": ["A. Always Option A because cost minimisation is the primary supply chain\nobjective", "B. Option B --- the competitive context (competitor offering next-day\ndelivery) means the service level advantage may be essential to retain\ncustomers, and the cost difference may be recoverable through higher\nretention", "C. Neither option --- always choose the middle ground", "D. Option A --- cost savings can always fund faster shipping later\n\nSECTION: BLOCKCHAIN"], "answer": "B", "explanation": "Network design must consider competitive context. If a competitor already delivers next-day to 80% of customers, Option A's 15% cost saving may not compensate for losing those customers to the competitor. The supply chain surplus framework supports Option B if faster delivery generates more revenue than the cost difference. BLOCKCHAIN"}, {"num": 244, "text": "A company's procurement director says: \"We want blockchain to\neliminate supplier fraud. But our suppliers are small businesses in\ndeveloping countries with limited technology.\" Which blockchain\nimplementation challenge is most relevant here?", "options": ["A. High computational costs of blockchain itself", "B. Adoption barriers --- suppliers with limited technical infrastructure\ncannot access or use blockchain platforms, undermining the network's\nvalue", "C. Scalability limitations in transaction throughput", "D. Regulatory uncertainty in the home market\n\nSECTION: DIGITAL TWINS"], "answer": "B", "explanation": "Blockchain's value depends on all supply chain participants being able to use it. Suppliers with limited technology access (smartphones only, intermittent internet, low digital literacy) represent a significant adoption barrier --- one of the key implementation challenges in your Lecture 7 slides. DIGITAL TWINS"}, {"num": 245, "text": "A Digital Twin of a supply chain finance system provides \"real-time\ntracking of financial transactions, risk assessment through predictive\nanalytics, and optimisation of cash flow and working capital.\" If a\nsupplier is predicted to default on a delivery, which action can the\nDigital Twin enable proactively?", "options": ["A. Nothing --- Digital Twins only work for physical supply chain\nelements", "B. The Digital Twin can model the financial impact of the default,\nidentify alternative financing or sourcing options, and recommend the\noptimal risk response before the default occurs", "C. The Digital Twin automatically executes payments to prevent default", "D. The Digital Twin sends a blockchain smart contract to replace the\nsupplier immediately\n\nSECTION: CROSS-TOPIC APPLIED"], "answer": "B", "explanation": "Supply Chain Finance Digital Twins use predictive analytics to identify financial risks (predicted supplier default) and model their impact. By doing this proactively, supply chain finance managers can arrange backup financing, renegotiate terms, or activate alternative suppliers before a crisis materialises. CROSS-TOPIC APPLIED"}, {"num": 246, "text": "The module MNA1179 --- Digital Supply Chain & Innovation at DCU teaches\nthat \"digital technologies should optimise supply chain operations.\"\nWhich of the following best captures the MODULE'S LEARNING OUTCOME in\napplied terms?", "options": ["A. Students can define what a supply chain is", "B. Students can apply digital technologies (AI, Blockchain, Digital\nTwins, IoT, AM) to real supply chain scenarios, analyse their impact,\nand evaluate case studies of successful implementations", "C. Students can write code for supply chain AI systems", "D. Students can memorise blockchain features and XAI definitions\n\nSECTION: ADDITIVE MANUFACTURING"], "answer": "B", "explanation": "Your module's learning outcomes (directly from the lecture slides) include: understanding digital supply chain concepts, APPLYING digital technologies to optimise operations, ANALYSING innovation impact on strategies, and EVALUATING case studies of successful implementations. Applied application is the core goal. ADDITIVE MANUFACTURING"}, {"num": 247, "text": "A closed-loop electronics supply chain uses AM to refurbish returned\nsmartphones by printing replacement components using recycled plastic\nextracted from the returned devices. Which two supply chain concepts\ndoes this combine?", "options": ["A. Push production and vertical integration", "B. AM (enabling component production from digital files) and Circular\nEconomy (using returned product materials as AM feedstock --- reducing\nwaste and resource extraction)", "C. JIT and blockchain", "D. Digital twin and IoT monitoring\n\nSECTION: AI & EXPLAINABLE AI"], "answer": "B", "explanation": "This scenario combines AM (printing components from digital files on demand) with circular economy principles (recycled materials from returned products used as AM input). Together they create a closed-loop system where end-of-life products become raw materials --- exemplifying sustainable supply chain design. AI & EXPLAINABLE AI"}, {"num": 248, "text": "A supply chain AI system is described as achieving \"enhanced\nperformance evaluation.\" In practice, a supply chain manager reviews\nthe AI's procurement recommendations and finds that the AI consistently\noptimises for lowest price while ignoring delivery reliability scores\nabove 90%. How does XAI help?", "options": ["A. XAI prevents the AI from ever making low-price recommendations", "B. XAI reveals that the AI is over-weighting price in its objective\nfunction --- the manager can see this clearly and adjust the AI's\nweighting to include reliability at the required level", "C. XAI automatically balances price and reliability", "D. XAI sends an alert to the supplier to improve reliability\n\nSECTION: DIGITAL SUPPLY CHAIN"], "answer": "B", "explanation": "XAI for performance evaluation allows managers to see exactly how the AI is weighting different KPIs. When an imbalance is revealed (all price, no reliability), the manager can adjust the objective function or override specific recommendations --- keeping AI aligned with actual business goals. DIGITAL SUPPLY CHAIN"}, {"num": 249, "text": "A supply chain consultant categorises three companies as follows:\nCompany A uses spreadsheets and reacts to disruptions. Company B uses\nintegrated ERP and cloud dashboards to monitor operations. Company C\nuses AI for autonomous decisions and Digital Twins for real-time\nsimulation. Which maturity level is each at?", "options": ["A. A=Transformed, B=Enabled, C=Immature", "B. A=Immature, B=Enabled, C=Transformed", "C. A=Enabled, B=Immature, C=Transformed", "D. A=Enabled, B=Transformed, C=Immature\n\nSECTION: CROSS-TOPIC APPLIED"], "answer": "B", "explanation": "Using the maturity model from Lecture 5: Company A (spreadsheets, reactive) = Digitally Immature; Company B (ERP, cloud, dashboards) = Digitally Enabled; Company C (autonomous AI decisions, real-time Digital Twins) = Digitally Transformed. CROSS-TOPIC APPLIED"}, {"num": 250, "text": "Professor Dohale's quiz questions are described as \"applied concept\"\nquestions, not definition questions. A question asks: \"An agricultural\ncompany faces crop yield unpredictability and food safety risks. Which\nTWO technologies from your course would you recommend and why?\" The\nBEST answer is:", "options": ["A. Blockchain only, because it tracks food from farm to table", "B. AI (for crop yield prediction, pest detection, and harvest scheduling\noptimisation) AND Blockchain (for farm-to-table traceability and food\nsafety verification) --- addressing both predictability and safety with\nevidence from your lecture sector applications", "C. Additive Manufacturing, because 3D printing can create food on-site", "D. Digital Twins only, because virtual models can simulate crop growth"], "answer": "B", "explanation": "Applied questions require matching technologies to specific problems with justification. AI addresses predictability (yield forecasting, pest detection). Blockchain addresses safety (immutable farm-to-table traceability). Both are directly supported by your lecture's agricultural sector applications for AI and blockchain --- exactly the kind of evidence-based applied reasoning Dr. Dohale's sample questions demonstrate."}];

      if (selectedTopics.size === 1) return;
      selectedTopics.delete(name);
      chip.classList.remove('selected');
      chip.querySelector('.check').textContent = '';
    } else {
      selectedTopics.add(name);
      chip.classList.add('selected');
      chip.querySelector('.check').textContent = '✓';
    }
  });
  topicGrid.appendChild(chip);
});

// Count buttons
document.querySelectorAll('.count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    questionCount = parseInt(btn.dataset.count);
  });
});

// Start
document.getElementById('start-btn').addEventListener('click', startQuiz);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // Filter by topics
  let pool = QUIZ_DATA.filter(q => selectedTopics.has(getTopicForQ(q)));
  pool = shuffle(pool);
  
  const n = questionCount === 0 ? pool.length : Math.min(questionCount, pool.length);
  quizQuestions = pool.slice(0, n);
  currentIdx = 0;
  score = 0;
  answers = [];
  answered = false;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;
  answered = false;

  document.getElementById('progress-fill').style.width = `${(currentIdx / total) * 100}%`;
  document.getElementById('q-counter').textContent = `Question ${currentIdx + 1} of ${total}`;
  document.getElementById('score-live').textContent = `Score: ${score}`;
  document.getElementById('q-num').textContent = `Q${q.num}`;
  
  const topic = getTopicForQ(q);
  const tEl = document.getElementById('q-topic');
  tEl.textContent = TOPICS[topic].icon + ' ' + topic;
  
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('explanation-box').classList.remove('show');
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentIdx < total - 1 ? 'Next →' : 'Finish →';

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';

  q.options.forEach((opt, i) => {
    const letter = opt.charAt(0);
    const text = opt.slice(3);
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letter}</span><span>${text}</span>`;
    btn.addEventListener('click', () => selectAnswer(letter, btn, q));
    optList.appendChild(btn);
  });
}

function selectAnswer(chosen, clickedBtn, q) {
  if (answered) return;
  answered = true;
  
  const correct = q.answer;
  const isCorrect = chosen === correct;
  if (isCorrect) score++;
  
  answers.push({ q, chosen, correct: isCorrect });

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(btn => {
    const letter = btn.querySelector('.opt-letter').textContent;
    if (letter === correct) {
      btn.classList.add('correct');
    } else if (letter === chosen && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dim');
    }
    btn.disabled = true;
  });

  document.getElementById('exp-text').textContent = q.explanation;
  document.getElementById('explanation-box').classList.add('show');
  document.getElementById('next-btn').disabled = false;
  document.getElementById('score-live').textContent = `Score: ${score}`;
}

function nextQuestion() {
  if (!answered) return;
  currentIdx++;
  if (currentIdx >= quizQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const total = quizQuestions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('pct-text').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total - score;
  document.getElementById('stat-total').textContent = total;

  // Animate ring
  const circ = 263.9;
  const arc = document.getElementById('score-arc');
  const offset = circ - (circ * pct / 100);
  
  let strokeColor;
  if (pct >= 80) strokeColor = '#10b981';
  else if (pct >= 60) strokeColor = '#f59e0b';
  else strokeColor = '#ef4444';
  arc.style.stroke = strokeColor;
  setTimeout(() => { arc.style.strokeDashoffset = offset; }, 100);

  // Title
  let title, subtitle;
  if (pct >= 90) { title = '🏆 Excellent!'; subtitle = "Outstanding performance — you clearly know this material."; }
  else if (pct >= 80) { title = '🎯 Great Work!'; subtitle = "Strong understanding across topics."; }
  else if (pct >= 70) { title = '👍 Good Effort!'; subtitle = "Solid foundation — a bit more review and you'll ace it."; }
  else if (pct >= 50) { title = '📚 Keep Studying!'; subtitle = "Review the explanations and try again — you'll improve!"; }
  else { title = '💪 Keep Going!'; subtitle = "Focus on the explanations — every attempt builds knowledge."; }
  
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = `${score}/${total} correct (${pct}%) · ${subtitle}`;

  // Review wrong answers
  const reviewEl = document.getElementById('review-section');
  const wrongOnes = answers.filter(a => !a.correct);
  
  if (wrongOnes.length === 0) {
    reviewEl.innerHTML = '<div class="review-section"><h3>🎉 Perfect Score — No Mistakes!</h3></div>';
  } else {
    reviewEl.innerHTML = `<h3 style="font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:16px;">📝 Review Wrong Answers (${wrongOnes.length})</h3>`;
    wrongOnes.forEach(({q, chosen}) => {
      const topic = getTopicForQ(q);
      const correctOpt = q.options.find(o => o.charAt(0) === q.answer);
      const chosenOpt = q.options.find(o => o.charAt(0) === chosen);
      const div = document.createElement('div');
      div.className = 'review-item wrong-ans';
      div.innerHTML = `
        <div class="ri-header">
          <span>Q${q.num}</span>
          <span class="ri-badge wrong">✗ WRONG</span>
          <span>${TOPICS[topic]?.icon || ''} ${topic}</span>
        </div>
        <div class="ri-q">${q.text}</div>
        <div style="font-size:0.82rem;margin-bottom:8px;">
          <span style="color:var(--error)">Your answer: ${chosenOpt || chosen}</span><br>
          <span style="color:var(--success)">Correct: ${correctOpt || q.answer}</span>
        </div>
        <div class="ri-exp">💡 ${q.explanation}</div>
      `;
      reviewEl.appendChild(div);
    });
  }
}

function retakeQuiz() {
  startQuiz();
}

function goHome() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}
</script>
</body>
